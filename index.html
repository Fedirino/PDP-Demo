<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PDP">
<meta name="theme-color" content="#0b110d">
<title>PDP — Produce Department Portal</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon192.png">
<link rel="apple-touch-icon" href="icon192.png">
<style>
  :root{
    /* v4 "Dawn Market" — deep pine canvas, fresh-leaf accents */
    --bg:#0b110d; --surface:#141c16; --surface-2:#1b241c; --surface-3:#101712;
    --ink:#e9f2ea; --ink-2:#aebbab; --ink-3:#71806f;
    --line:#22301f; --line-2:#2d3c2a;
    --brand:#34c45f; --brand-d:#27a44d; --brand-h:#4bd673;
    --brand-tint:#16321c; --brand-tint-2:#122a18; --brand-ink:#5fe389;
    --brand-grad:linear-gradient(135deg,#3ddc6e 0%,#1f9e4c 100%);
    --hero-grad:linear-gradient(155deg,#1d7a3a 0%,#135c2c 48%,#0a3a1c 100%);
    --glow:0 0 0 1px rgba(61,220,110,.25),0 4px 18px rgba(40,180,90,.22);
    --mono-bg:#101712; --mono-ink:#97ab92;
    --amber:#ffa028; --amber-tint:#2e2110; --amber-ink:#ffb654;
    --berry:#d966c8; --berry-tint:#2c1729;
    --sky:#4db8e8; --sky-tint:#11242e;
    --citrus:#ffc63a; --citrus-tint:#2e2610;
    --violet:#9b8cff; --violet-tint:#1c1930;
    --danger:#ef5246; --danger-tint:#311714; --danger-line:#5e2a23;
    --r-lg:18px; --r:14px; --r-sm:11px;
    --sh-sm:0 1px 2px rgba(0,0,0,.3);
    --sh:0 1px 3px rgba(0,0,0,.35),0 4px 16px rgba(0,0,0,.28);
    --sh-hero:0 10px 32px rgba(0,0,0,.5),0 2px 10px rgba(30,160,80,.18);
    --tabh:64px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:-apple-system,"SF Pro Text",BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);overscroll-behavior-y:none;
    -webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }
  .tnum{font-variant-numeric:tabular-nums;}
  #shell{position:relative;min-height:100%;display:flex;flex-direction:column;max-width:600px;margin:0 auto;}

  .topbar{
    position:sticky;top:0;z-index:30;background:rgba(11,17,13,.86);
    backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);
    border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 54px) 16px 12px;
    display:flex;align-items:center;gap:11px;min-height:58px;
  }
  .brand{width:38px;height:38px;flex:none;overflow:hidden;}
  .brand img{width:100%;height:100%;object-fit:contain;display:block;}
  .tb-tt{flex:1;min-width:0;}
  .tb-tt h1{margin:0;font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1.15;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tb-act{appearance:none;background:var(--surface);color:var(--brand);
    font:inherit;font-size:13.5px;font-weight:600;padding:7px 15px;border-radius:999px;cursor:pointer;
    border:1px solid var(--line-2);transition:background .15s ease;}
  .tb-act:active{background:var(--surface-2);}
  .tb-act.danger{color:var(--danger);border-color:var(--danger-line);}

  main{flex:1;padding:18px 16px calc(var(--tabh) + env(safe-area-inset-bottom) + 26px);}

  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:center;
    background:rgba(11,17,13,.92);backdrop-filter:saturate(150%) blur(18px);
    -webkit-backdrop-filter:saturate(150%) blur(18px);border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);}
  .tabbar .inner{width:100%;max-width:600px;display:flex;}
  .tab{flex:1;appearance:none;border:none;background:none;cursor:pointer;font:inherit;
    display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0 7px;color:var(--ink-3);
    height:var(--tabh);justify-content:center;transition:color .15s ease;}
  .tab .ic{width:40px;height:26px;display:grid;place-items:center;border-radius:999px;transition:background .18s ease,box-shadow .18s ease;}
  .tab svg{width:21px;height:21px;}
  .tab span{font-size:9.5px;font-weight:600;letter-spacing:.01em;}
  .tab.active{color:var(--brand-ink);}
  .tab.active .ic{background:var(--brand-tint);box-shadow:0 0 0 1px rgba(61,220,110,.3),0 2px 10px rgba(40,180,90,.25);}
  .tab.active span{font-weight:700;}

  .btn{appearance:none;border:none;cursor:pointer;font:inherit;font-weight:600;font-size:13px;
    color:#fff;background:var(--brand);border-radius:var(--r-sm);
    padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:7px;
    box-shadow:var(--sh-sm);transition:transform .08s ease,background .15s ease;}
  .btn:active{transform:scale(.985);background:var(--brand-d);}
  .btn.block{width:100%;}
  .btn.ghost{background:var(--surface);color:var(--brand);border:1px solid var(--line-2);}
  .btn.ghost:active{background:var(--surface-2);}
  .btn svg{width:14px;height:14px;}
  .btn-danger{appearance:none;border:1px solid var(--danger-line);background:var(--surface);color:var(--danger);
    font:inherit;font-weight:600;font-size:13px;padding:10px;border-radius:var(--r-sm);cursor:pointer;width:100%;
    box-shadow:var(--sh-sm);}
  .btn-danger:active{background:var(--danger-tint);}
  .btn-danger{display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-danger svg{width:15px;height:15px;flex:none;}

  .hero{position:relative;overflow:hidden;border-radius:var(--r-lg);padding:24px 22px 20px;color:#ecf7ef;
    background:var(--hero-grad);box-shadow:var(--sh-hero);
    animation:rise .45s cubic-bezier(.2,.8,.3,1) both;}
  .hero::before{content:"";position:absolute;inset:0;
    background:radial-gradient(130% 100% at 88% -12%,rgba(255,255,255,.16),transparent 52%);pointer-events:none;}
  .hero::after{content:"";position:absolute;top:0;bottom:0;width:55%;left:-60%;pointer-events:none;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.07) 45%,rgba(255,255,255,.12) 50%,rgba(255,255,255,.07) 55%,transparent);
    animation:sheen 7s ease-in-out infinite;}
  @keyframes sheen{0%,55%{left:-60%}80%,100%{left:130%}}
  .hero .ey{font-size:11px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;opacity:.66;}
  .hero h2{margin:9px 0 0;font-size:28px;font-weight:800;letter-spacing:-.035em;line-height:1.06;}
  .hero .date{margin-top:8px;font-size:13.5px;opacity:.76;font-weight:500;}
  .hero-stats{position:relative;display:flex;gap:8px;margin-top:18px;}
  .hstat{flex:1;appearance:none;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.22);
    border-radius:13px;padding:10px 8px 9px;cursor:pointer;font:inherit;color:#ecf7ef;text-align:center;
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    transition:transform .1s cubic-bezier(.2,.8,.3,1),background .15s ease;}
  .hstat:active{transform:scale(.95);background:rgba(0,0,0,.34);}
  .hstat .hv{font-size:21px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;}
  .hstat .hv small{font-size:12px;font-weight:700;opacity:.66;letter-spacing:0;}
  .hstat .hl{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;opacity:.68;margin-top:5px;}
  .hstat.zero .hv{opacity:.55;}
  .hstat.wide{flex:1;text-align:left;padding:11px 14px 10px;display:flex;flex-direction:column;gap:5px;}
  .hstat.wide .hv{font-size:17px;letter-spacing:-.02em;}
  .hstat.wide .hl{margin-top:0;}

  .home-checklist-btn{
    width:100%;display:flex;align-items:center;gap:14px;
    background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r);
    padding:14px 14px 14px 16px;cursor:pointer;appearance:none;font:inherit;
    color:var(--ink);text-align:left;transition:background .15s ease,border-color .15s ease;
  }
  .home-checklist-btn:active{background:var(--surface-2);}
  .hcl-icon{width:38px;height:38px;flex:none;display:grid;place-items:center;
    background:var(--brand-tint);border-radius:10px;color:var(--brand);}
  .hcl-icon svg{width:20px;height:20px;}
  .hcl-body{flex:1;min-width:0;}
  .hcl-title{font-size:15px;font-weight:700;letter-spacing:-.01em;}
  .hcl-sub{font-size:12.5px;color:var(--ink-2);margin-top:2px;}
  .hcl-arrow{color:var(--ink-3);flex:none;}
  .hcl-arrow svg{width:16px;height:16px;}
  .home-fact{
    background:var(--brand-tint-2);border:1px solid rgba(61,220,110,.15);
    border-radius:var(--r);padding:14px 15px;font-size:13.5px;line-height:1.55;
    color:var(--ink-2);display:flex;gap:10px;align-items:flex-start;
  }
  .fact-leaf{font-size:18px;flex:none;margin-top:1px;}

  .lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);
    margin:26px 4px 12px;}

  .tiles{display:flex;flex-direction:column;gap:11px;}
  .tilegrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .tile.compact{flex-direction:column;align-items:flex-start;gap:10px;padding:13px 14px;}
  .tile.compact .chip{width:38px;height:38px;border-radius:12px;}
  .tile.compact .chip svg{width:19px;height:19px;}
  .tile.compact .tt{font-size:14.5px;}
  .tile.compact .go{display:none;}
  .tile.soon{flex-direction:row;align-items:center;gap:10px;padding:10px 12px;opacity:.6;cursor:default;}
  .tile.soon .chip{width:32px;height:32px;border-radius:10px;}
  .tile.soon .chip svg{width:16px;height:16px;}
  .tile.soon .tt{font-size:13px;}
  .tile.soon .badge{margin-left:auto;color:var(--ink-3);font-size:9px;font-weight:700;letter-spacing:.07em;flex:none;}
  .tile{text-align:left;appearance:none;border:1px solid var(--line);background:var(--surface);
    border-radius:var(--r);padding:16px 17px;cursor:pointer;font:inherit;color:inherit;box-shadow:var(--sh-sm);
    display:flex;align-items:center;gap:15px;
    transition:transform .08s ease,box-shadow .16s ease;
    animation:rise .45s cubic-bezier(.2,.8,.3,1) both;}
  .tile:active{transform:scale(.985);}
  .tile .chip{width:46px;height:46px;flex:none;border-radius:14px;display:grid;place-items:center;
    background:var(--brand-tint);color:var(--brand-ink);}
  .tile .chip.amber{background:var(--amber-tint);color:var(--amber);}
  .tile .chip.citrus{background:var(--citrus-tint);color:var(--citrus);}
  .tile .chip.berry{background:var(--berry-tint);color:var(--berry);}
  .tile .chip.sky{background:var(--sky-tint);color:var(--sky);}
  .tile .chip.violet{background:var(--violet-tint);color:var(--violet);}
  .tile .chip.mute{background:var(--surface-3);color:var(--ink-3);}
  .tile svg{width:23px;height:23px;}
  .tile .tx{flex:1;min-width:0;}
  .tile .tt{font-size:16px;font-weight:700;letter-spacing:-.015em;}
  .tile .sub{font-size:12.5px;color:var(--ink-3);margin-top:3px;font-weight:500;}
  .tile .go{flex:none;color:var(--ink-3);}
  .tile .go svg{width:20px;height:20px;}
  @keyframes rise{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:none;}}

  .seg{display:flex;background:var(--surface-3);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px;
    margin-bottom:14px;}
  .seg button{flex:1;appearance:none;border:none;background:none;font:inherit;font-weight:600;font-size:14px;
    color:var(--ink-2);padding:9px 8px;border-radius:8px;cursor:pointer;display:flex;align-items:center;
    justify-content:center;gap:7px;transition:all .15s ease;}
  .seg button.on{background:var(--surface);color:var(--brand);box-shadow:var(--sh-sm);}
  .seg .pill{min-width:20px;height:20px;padding:0 6px;border-radius:7px;background:var(--brand);color:#fff;
    font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;
    font-variant-numeric:tabular-nums;}
  .seg button:not(.on) .pill{background:var(--ink-3);}

  .backlink{display:inline-flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;
    font:inherit;font-size:13.5px;font-weight:600;color:var(--brand);padding:2px 0 14px;}
  .backlink svg{width:17px;height:17px;}

  .search{position:sticky;top:calc(env(safe-area-inset-top) + 70px);z-index:20;display:flex;align-items:center;
    gap:10px;background:var(--surface);border:1px solid var(--line-2);border-radius:13px;padding:0 14px;
    box-shadow:var(--sh-sm);margin-bottom:14px;transition:border-color .15s ease,box-shadow .15s ease;}
  .search:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint);}
  .search .si{color:var(--ink-3);display:grid;place-items:center;flex:none;}
  .search .si svg{width:20px;height:20px;}
  .search input{flex:1;border:none;background:none;font:inherit;font-size:16px;font-weight:500;padding:15px 0;
    color:var(--ink);outline:none;min-width:0;}
  .search input::placeholder{color:var(--ink-3);font-weight:500;}
  .search .clr{appearance:none;border:none;background:var(--surface-3);color:var(--ink-2);width:26px;height:26px;
    border-radius:50%;flex:none;cursor:pointer;display:none;place-items:center;}
  .search .clr.show{display:grid;}
  .search .clr svg{width:14px;height:14px;}

  .smeta{font-size:12px;color:var(--ink-3);font-weight:500;margin:0 4px 12px;display:flex;
    align-items:center;justify-content:space-between;gap:10px;}
  .smeta b{color:var(--ink-2);font-weight:700;}

  .sr{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;cursor:pointer;
    font:inherit;color:inherit;box-shadow:var(--sh-sm);
    transition:transform .07s ease,background .14s ease,border-color .14s ease;}
  .sr:active{transform:scale(.99);}
  .sr .add{width:30px;height:30px;border-radius:9px;border:1.6px solid var(--line-2);flex:none;display:grid;
    place-items:center;color:var(--ink-3);background:var(--surface);transition:all .14s ease;}
  .sr .add svg{width:18px;height:18px;transition:transform .14s ease;}
  .sr .bd{flex:1;min-width:0;}
  .sr .nm{font-size:15px;font-weight:600;letter-spacing:-.01em;line-height:1.25;}
  .sr .nm mark{background:var(--brand-tint);color:var(--brand-ink);border-radius:3px;padding:0 2px;font-weight:700;}
  .sr .mt{font-size:11.5px;color:var(--ink-3);font-weight:500;margin-top:3px;font-variant-numeric:tabular-nums;
    display:flex;flex-wrap:wrap;gap:4px 9px;}
  .sr .mt .code{color:var(--brand-ink);font-weight:700;}
  .sr.on{background:var(--brand-tint-2);border-color:var(--brand);}
  .sr.on .add{background:var(--brand);border-color:var(--brand);color:#fff;}
  .sr.on .add svg{transform:rotate(45deg);}
  .sr.on .nm{color:var(--brand-ink);}

  .empty{text-align:center;color:var(--ink-2);font-size:14px;line-height:1.55;padding:46px 26px;}
  .empty .ei{width:54px;height:54px;border-radius:15px;margin:0 auto 15px;display:grid;place-items:center;
    background:var(--surface);border:1px solid var(--line);color:var(--brand);box-shadow:var(--sh-sm);}
  .empty .ei svg{width:26px;height:26px;}
  .empty b{color:var(--ink);font-weight:600;}

  .row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--r);padding:11px 13px;margin-bottom:9px;cursor:pointer;
    box-shadow:var(--sh-sm);font:inherit;color:inherit;transition:transform .08s ease,border-color .15s ease;}
  .row:active{transform:scale(.99);}
  .row .nm{flex:1;font-size:15.5px;font-weight:600;letter-spacing:-.01em;}
  .row .cnt{flex:none;min-width:24px;height:24px;padding:0 8px;border-radius:7px;background:var(--brand-tint);
    color:var(--brand-ink);font-size:12.5px;font-weight:700;display:flex;align-items:center;justify-content:center;
    font-variant-numeric:tabular-nums;}
  .row .chev{flex:none;color:var(--ink-3);display:grid;place-items:center;transition:transform .2s ease,color .2s ease;}
  .row .chev svg{width:19px;height:19px;}
  .row.openhdr{margin-bottom:6px;box-shadow:none;border-color:var(--line-2);}
  .row.openhdr .chev{transform:rotate(90deg);color:var(--brand);}
  .row.editing{cursor:default;}
  .row input.rn{flex:1;font:inherit;font-size:15.5px;font-weight:600;background:var(--surface-2);
    border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--ink);min-width:0;}
  .row input.rn:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint);}
  .endbody{margin:0 0 16px 9px;padding-left:14px;border-left:2px solid var(--line-2);}

  .del{appearance:none;border:none;background:var(--danger-tint);color:var(--danger);width:40px;height:40px;
    border-radius:10px;font-size:20px;flex:none;cursor:pointer;display:flex;align-items:center;
    justify-content:center;transition:background .15s ease;}
  .del:active{background:#43201b;}

  .item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface);
    border:1px solid var(--line);border-radius:11px;padding:0 13px;margin-bottom:8px;min-height:54px;
    cursor:pointer;font:inherit;color:inherit;transition:transform .07s ease,background .14s ease,border-color .14s ease;}
  .item:active{transform:scale(.99);}
  .item .tick{width:24px;height:24px;border-radius:50%;border:2px solid var(--line-2);flex:none;display:grid;
    place-items:center;color:#fff;transition:background .14s ease,border-color .14s ease;}
  .item .tick svg{width:14px;height:14px;opacity:0;transition:opacity .12s ease;}
  .item .pn{flex:1;font-size:15px;font-weight:500;padding:13px 0;letter-spacing:-.005em;}
  .item.on{background:var(--brand-tint-2);border-color:var(--brand);}
  .item.on .pn{font-weight:600;color:var(--brand-ink);}
  .item.on .tick{background:var(--brand);border-color:var(--brand);}
  .item.on .tick svg{opacity:1;}
  .endbody .item{min-height:48px;}

  .addrow{display:flex;gap:9px;margin:8px 0 4px;}
  .addrow input{flex:1;font:inherit;font-size:15px;padding:13px 14px;border-radius:11px;border:1px solid var(--line-2);
    background:var(--surface);color:var(--ink);min-width:0;}
  .addrow input::placeholder{color:var(--ink-3);}
  .addrow input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint);}
  .addrow button{appearance:none;border:none;background:var(--brand);color:#fff;font:inherit;font-weight:600;
    font-size:14.5px;padding:0 18px;border-radius:11px;cursor:pointer;flex:none;}
  .addrow button:active{background:var(--brand-d);}
  .addrow-wrap{position:relative;}
  .sg{position:absolute;left:0;right:0;top:100%;z-index:25;background:var(--surface);border:1px solid var(--line-2);
    border-radius:0 0 11px 11px;box-shadow:var(--sh);max-height:240px;overflow-y:auto;display:none;}
  .sg.open{display:block;}
  .sg-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:11px 14px;
    border:none;background:none;font:inherit;color:var(--ink);cursor:pointer;border-bottom:1px solid var(--line);}
  .sg-item:last-child{border-bottom:none;}
  .sg-item:active{background:var(--brand-tint-2);}
  .sg-item .sg-name{flex:1;font-size:14px;font-weight:600;letter-spacing:-.005em;min-width:0;}
  .sg-item .sg-name mark{background:var(--brand-tint);color:var(--brand-ink);border-radius:3px;padding:0 2px;font-weight:700;}
  .sg-item .sg-code{flex:none;font-size:11px;color:var(--brand-ink);font-weight:700;font-variant-numeric:tabular-nums;}
  .sg-item .sg-meta{flex:none;font-size:11px;color:var(--ink-3);font-weight:500;}

  .grp{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--brand-ink);
    margin:22px 4px 11px;display:flex;align-items:center;gap:10px;}
  .grp:first-child{margin-top:4px;}
  .grp::before{content:"";width:14px;height:3px;border-radius:2px;background:var(--brand);flex:none;}
  .grp .gc{margin-left:auto;color:var(--ink-3);font-weight:700;font-variant-numeric:tabular-nums;
    letter-spacing:0;font-size:11px;}
  .subgrp{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--brand-ink);
    margin:11px 4px 8px 15px;display:flex;align-items:center;gap:7px;}
  .subgrp::before{content:"";width:12px;height:2px;border-radius:2px;background:var(--brand);}

  .li{background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;
    box-shadow:var(--sh-sm);overflow:hidden;}
  .li-main{display:flex;align-items:center;gap:12px;padding:11px 13px;}
  .li-check{width:25px;height:25px;border-radius:50%;border:2px solid var(--line-2);flex:none;cursor:pointer;
    display:grid;place-items:center;color:#fff;transition:background .14s ease,border-color .14s ease;}
  .li-check svg{width:14px;height:14px;opacity:0;transition:opacity .12s ease;}
  .li-bd{flex:1;min-width:0;}
  .li-name{font-size:15px;font-weight:600;letter-spacing:-.005em;line-height:1.25;}
  .li-mt{font-size:11.5px;color:var(--ink-3);font-weight:500;margin-top:3px;font-variant-numeric:tabular-nums;
    display:flex;flex-wrap:wrap;gap:4px 9px;}
  .li-mt .code{color:var(--brand-ink);font-weight:700;}
  .li-note{color:var(--amber-ink);font-size:12.5px;font-weight:600;margin-top:4px;display:flex;align-items:center;gap:5px;}
  .li-note svg{width:13px;height:13px;flex:none;}
  .li.done .li-name{text-decoration:line-through;color:var(--ink-3);font-weight:500;}
  .li.done .li-check{background:var(--brand);border-color:var(--brand);}
  .li.done .li-check svg{opacity:1;}
  .li.done{opacity:.55;}
  .li-act{appearance:none;border:none;background:var(--surface-2);color:var(--ink-2);width:36px;height:36px;
    border-radius:9px;cursor:pointer;flex:none;display:grid;place-items:center;transition:background .15s ease;}
  .li-act svg{width:17px;height:17px;}
  .li-act:active{background:var(--surface-3);}
  .li-act.rm{background:var(--danger-tint);color:var(--danger);}
  .li-note-edit{padding:0 13px 12px;display:none;}
  .li-note-edit.open{display:block;}
  .li-note-edit input{width:100%;font:inherit;font-size:14.5px;padding:11px 12px;border-radius:9px;
    border:1px solid var(--amber);background:var(--amber-tint);color:var(--ink);}
  .li-note-edit input:focus{outline:none;box-shadow:0 0 0 3px rgba(255,160,40,.16);}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-sm);
    padding:18px;margin-bottom:12px;}
  .panel-h{display:flex;align-items:center;gap:13px;margin-bottom:16px;}
  .panel-h .chip{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:var(--brand-tint);color:var(--brand);}
  .panel-h .chip svg{width:22px;height:22px;}
  .panel-h .chip.amber{background:var(--amber-tint);color:var(--amber);}
  .panel-h h3{margin:0;font-size:16.5px;font-weight:700;letter-spacing:-.015em;}
  .panel-h p{margin:2px 0 0;font-size:12px;color:var(--ink-3);font-weight:500;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin:0 0 7px 2px;}
  .money{display:flex;align-items:center;background:var(--surface-2);border:1px solid var(--line-2);border-radius:11px;
    padding:0 14px;transition:border-color .15s ease,box-shadow .15s ease;}
  .money:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint);}
  .money .cur{color:var(--ink-3);font-size:19px;font-weight:600;}
  .money input{flex:1;border:none;background:none;font:inherit;font-size:21px;font-weight:600;padding:14px 8px;
    color:var(--ink);outline:none;font-variant-numeric:tabular-nums;-moz-appearance:textfield;}
  .money input::-webkit-outer-spin-button,.money input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .result{margin-top:15px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
    background:var(--hero-grad);border-radius:12px;box-shadow:var(--glow);padding:16px 17px;color:#eaf4ee;}
  .result .rl{font-size:11px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;opacity:.72;}
  .result .rv{font-size:29px;font-weight:700;letter-spacing:-.025em;line-height:1;margin-top:6px;font-variant-numeric:tabular-nums;}
  .copy{appearance:none;border:none;background:rgba(255,255,255,.14);color:#fff;font:inherit;font-weight:600;
    font-size:13px;padding:9px 14px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .copy svg{width:15px;height:15px;}
  .copy:active{background:rgba(255,255,255,.28);}
  .hintline{font-size:12px;color:var(--ink-3);margin-top:13px;line-height:1.55;}

  .gev-cat{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--brand-ink);
    margin:18px 0 9px;display:flex;align-items:center;gap:8px;}
  .gev-cat:first-child{margin-top:4px;}
  .gev-cat::before{content:"";width:12px;height:3px;border-radius:2px;background:var(--brand);flex:none;}
  .gev-cat .gc{margin-left:auto;color:var(--ink-3);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:0;font-size:11px;}
  .gev-item{display:flex;align-items:center;gap:11px;padding:10px 13px;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:5px;cursor:pointer;
    font:inherit;color:inherit;transition:opacity .15s ease;}
  .gev-item:active{opacity:.8;}
  .gev-item .gev-name{flex:1;font-size:13.5px;font-weight:600;letter-spacing:-.005em;transition:color .15s ease;}
  .gev-item.crossed{opacity:.45;}
  .gev-item.crossed .gev-name{text-decoration:line-through;color:var(--ink-3);font-weight:500;}
  .gev-item .gev-tick{width:22px;height:22px;border-radius:50%;border:2px solid var(--line-2);flex:none;display:grid;
    place-items:center;color:#fff;transition:background .14s ease,border-color .14s ease;}
  .gev-item .gev-tick svg{width:13px;height:13px;opacity:0;transition:opacity .12s ease;}
  .gev-item.crossed .gev-tick{background:var(--brand);border-color:var(--brand);}
  .gev-item.crossed .gev-tick svg{opacity:1;}
  .gev-summary{font-size:12px;color:var(--ink-3);font-weight:500;margin:0 4px 12px;display:flex;align-items:center;justify-content:space-between;}
  .gev-summary b{color:var(--ink-2);font-weight:700;}
  .gev-ibtn{appearance:none;border:none;background:none;cursor:pointer;padding:4px;color:var(--ink-3);
    display:grid;place-items:center;border-radius:6px;transition:color .12s ease,background .12s ease;}
  .gev-ibtn:active{background:var(--surface-2);color:var(--ink);}
  .gev-ibtn svg{width:14px;height:14px;}
  .gev-cat-btn{appearance:none;border:none;background:none;cursor:pointer;padding:2px 4px;color:var(--ink-3);
    display:inline-flex;align-items:center;border-radius:4px;transition:color .12s ease;}
  .gev-cat-btn:active{color:var(--ink);}
  .gev-cat-btn svg{width:12px;height:12px;}
  .gev-add-btn{appearance:none;border:1px dashed var(--line-2);background:none;color:var(--ink-3);
    font:inherit;font-size:12px;font-weight:600;padding:8px 14px;border-radius:var(--r-sm);cursor:pointer;
    width:100%;display:flex;align-items:center;justify-content:center;gap:6px;
    transition:border-color .15s ease,color .15s ease;}
  .gev-add-btn:active{border-color:var(--brand);color:var(--brand);}
  .gev-add-btn svg{width:13px;height:13px;}

  /* ======= Toast Notification ======= */
  .toast{position:fixed;bottom:calc(var(--tabh) + env(safe-area-inset-bottom) + 16px);left:50%;z-index:60;
    transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;
    background:var(--surface);color:var(--ink);font-size:13px;font-weight:600;
    padding:11px 20px;border-radius:999px;border:1px solid var(--line);box-shadow:var(--sh);
    transition:opacity .25s ease,transform .25s cubic-bezier(.2,.8,.3,1);white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}

  /* ======= Modal sheet (replaces native prompt/confirm) ======= */
  .sheet-backdrop{position:fixed;inset:0;z-index:70;display:flex;align-items:flex-end;justify-content:center;
    background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .2s ease;
    padding:0 0 env(safe-area-inset-bottom);}
  .sheet-backdrop.open{opacity:1;pointer-events:auto;}
  .sheet{width:100%;max-width:600px;background:var(--surface);border:1px solid var(--line-2);
    border-bottom:none;border-radius:var(--r-lg) var(--r-lg) 0 0;padding:22px 20px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 40px rgba(0,0,0,.5);transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.85,.3,1);}
  .sheet-backdrop.open .sheet{transform:translateY(0);}
  .sheet-title{font-size:17px;font-weight:700;letter-spacing:-.01em;color:var(--ink);}
  .sheet-msg{font-size:13.5px;line-height:1.5;color:var(--ink-2);margin-top:7px;}
  .sheet-input{width:100%;font:inherit;font-size:16px;color:var(--ink);background:var(--surface-2);
    border:1px solid var(--line-2);border-radius:var(--r);padding:12px 13px;margin-top:15px;display:none;}
  .sheet-input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint);}
  .sheet.has-input .sheet-input{display:block;}
  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .sheet-btn{flex:1;appearance:none;font:inherit;font-size:15px;font-weight:600;padding:13px;border-radius:var(--r);
    cursor:pointer;border:1px solid var(--line-2);transition:background .15s ease,transform .1s ease;}
  .sheet-btn:active{transform:scale(.98);}
  .sheet-btn.ghost{background:var(--surface-2);color:var(--ink-2);}
  .sheet-btn.primary{background:var(--brand);color:#06210f;border-color:var(--brand);}
  .sheet-btn.danger{background:var(--danger);color:#fff;border-color:var(--danger);}

  /* ======= Polish: Micro-interactions ======= */
  .tile{transition:transform .12s cubic-bezier(.2,.8,.3,1),box-shadow .2s ease,border-color .2s ease;}
  .tile:active{transform:scale(.97);box-shadow:none;}
  .sr{transition:transform .1s cubic-bezier(.2,.8,.3,1),background .14s ease,border-color .14s ease;}
  .sr:active{transform:scale(.98);}
  .gev-item{transition:opacity .18s ease,transform .1s cubic-bezier(.2,.8,.3,1);}
  .gev-item:not([style*="cursor"]):active{transform:scale(.98);}
  .gev-item.crossed .gev-tick svg{opacity:1;transform:scale(1);transition:opacity .15s ease,transform .2s cubic-bezier(.15,1.4,.3,1);}
  .gev-item:not(.crossed) .gev-tick svg{transform:scale(.5);}
  .btn{transition:transform .1s cubic-bezier(.2,.8,.3,1),background .15s ease,box-shadow .15s ease;}
  .btn:active{transform:scale(.96);box-shadow:none;}
  .btn.ghost{transition:transform .1s cubic-bezier(.2,.8,.3,1),background .15s ease,border-color .15s ease;}
  .btn.ghost:active{transform:scale(.97);}
  .tb-act{transition:background .12s ease,transform .08s ease;}
  .tb-act:active{transform:scale(.95);background:var(--surface-2);}
  .tab{transition:color .2s ease;}
  .tab .ic{transition:background .2s ease,transform .15s cubic-bezier(.2,.8,.3,1);}
  .tab.active .ic{transform:scale(1);}
  .tab:active .ic{transform:scale(.9);}
  .seg button{transition:all .2s cubic-bezier(.2,.8,.3,1);}
  .sch-table td{transition:background .12s ease;}
  .sch-table tr:active td{background:var(--surface-2);}
  .sch-table td.hrs{transition:none;}
  .search{transition:border-color .2s ease,box-shadow .2s ease;}
  main{animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .ll-actions{margin-top:20px;display:flex;flex-direction:column;gap:8px;padding:14px 0 4px;
    border-top:1px solid var(--line);}
  .ll-summary{font-size:11px;font-weight:600;color:var(--ink-3);text-align:center;letter-spacing:.03em;margin-bottom:2px;}
  .danger-txt{color:var(--danger)!important;border-color:var(--danger-line)!important;}

  .uf-item{padding:10px 13px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:5px;}
  .uf-name{font-size:13px;font-weight:600;color:var(--ink);}
  .uf-meta{font-size:11px;color:var(--ink-3);margin-top:2px;line-height:1.4;}

  /* ======= Tools Hub ======= */
  .tool-card{text-align:left;appearance:none;border:1px solid var(--line);background:var(--surface);
    border-radius:var(--r);padding:14px 15px;cursor:pointer;font:inherit;color:inherit;box-shadow:var(--sh-sm);
    display:flex;align-items:center;gap:13px;width:100%;margin-bottom:9px;
    transition:transform .08s ease,box-shadow .16s ease;}
  .tool-card:active{transform:scale(.985);}
  .tool-card .chip{width:42px;height:42px;flex:none;border-radius:12px;display:grid;place-items:center;}
  .tool-card svg{width:21px;height:21px;}
  .tool-card .tx{flex:1;min-width:0;}
  .tool-card .tt{font-size:15px;font-weight:700;letter-spacing:-.015em;}
  .tool-card .sub{font-size:12px;color:var(--ink-3);margin-top:2px;font-weight:500;}
  .tool-card .go{flex:none;color:var(--ink-3);}
  .tool-card .go svg{width:18px;height:18px;}

  /* ======= Notes ======= */
  .note-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:14px 15px;margin-bottom:9px;box-shadow:var(--sh-sm);cursor:pointer;
    transition:transform .08s ease;}
  .note-card:active{transform:scale(.985);}
  .note-card .note-title{font-size:15px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .note-card .note-preview{font-size:12.5px;color:var(--ink-2);line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .note-card .note-date{font-size:10.5px;color:var(--ink-3);margin-top:6px;font-weight:500;}
  .note-editor textarea{width:100%;font:inherit;font-size:14px;background:var(--surface);
    border:1px solid var(--line-2);border-radius:var(--r);padding:12px 14px;color:var(--ink);
    min-height:180px;resize:vertical;line-height:1.55;}
  .note-editor textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint);}
  .note-editor input{width:100%;font:inherit;font-size:16px;font-weight:700;background:var(--surface);
    border:1px solid var(--line-2);border-radius:var(--r);padding:12px 14px;color:var(--ink);margin-bottom:10px;}
  .note-editor input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint);}

  /* ======= Calendar / Reminders ======= */
  .rem-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:13px 15px;margin-bottom:8px;box-shadow:var(--sh-sm);display:flex;align-items:center;gap:12px;}
  .rem-card .rem-icon{width:36px;height:36px;flex:none;border-radius:10px;display:grid;place-items:center;
    background:var(--amber-tint);color:var(--amber);}
  .rem-card .rem-icon svg{width:18px;height:18px;}
  .rem-card .rem-icon.past{background:var(--surface-3);color:var(--ink-3);}
  .rem-card .rem-bd{flex:1;min-width:0;}
  .rem-card .rem-title{font-size:14px;font-weight:700;letter-spacing:-.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rem-card .rem-time{font-size:12px;color:var(--ink-3);margin-top:2px;font-weight:500;}
  .rem-card .rem-del{appearance:none;border:none;background:none;cursor:pointer;padding:6px;
    color:var(--ink-3);border-radius:8px;flex:none;}
  .rem-card .rem-del:active{color:var(--danger);background:var(--danger-tint);}
  .rem-card .rem-del svg{width:16px;height:16px;}
  .rem-form{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:16px;box-shadow:var(--sh-sm);margin-bottom:14px;}
  .rem-form label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-3);margin-bottom:6px;}
  .rem-form input{width:100%;font:inherit;font-size:14px;background:var(--surface-2);
    border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--ink);margin-bottom:12px;}
  .rem-form input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint);}
  .rem-form input[type="datetime-local"]{color-scheme:dark;}

  .sch-section{margin-bottom:18px;}
  .sch-note{font-size:12px;color:var(--ink-3);margin:12px 4px 0;line-height:1.55;text-align:center;}

  .sch-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-sm);}
  .sch-table th,.sch-table td{padding:6px 3px;text-align:center;border-bottom:1px solid var(--line);
    font-size:11px;font-weight:600;vertical-align:middle;}
  .sch-table th{background:var(--surface-2);color:var(--ink-3);font-size:10px;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;position:sticky;top:0;z-index:2;}
  .sch-table th:first-child{text-align:left;padding-left:10px;min-width:80px;}
  .sch-table td:first-child{text-align:left;padding-left:10px;font-weight:700;font-size:12px;
    color:var(--ink);white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis;}
  .sch-table td{color:var(--ink);cursor:pointer;transition:background .1s ease;}
  .sch-table td:active{background:var(--brand-tint);}
  .sch-table td.off{color:var(--danger);font-weight:700;font-size:10px;}
  .sch-table td.unavail{color:#b08600;font-size:9px;}
  .sch-table td.reqoff{color:var(--ink-3);font-size:9px;font-style:italic;}
  .sch-table td.empty{color:var(--ink-3);}
  .sch-table td.hrs{font-size:10px;font-weight:700;color:var(--brand-ink);background:var(--brand-tint);
    cursor:default;min-width:32px;}
  .sch-table tr:last-child td{border-bottom:none;}

  .sch-edit-row{display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--line);background:var(--surface);}
  .sch-edit-row input{flex:1;font:inherit;font-size:12px;background:var(--surface-2);border:1px solid var(--line);
    border-radius:7px;padding:7px 8px;color:var(--ink);min-width:0;}
  .sch-edit-row input:focus{outline:none;border-color:var(--brand);}
  .sch-edit-row .del{flex:none;}
  .sch-edit-shifts{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:4px 10px 10px;}
  .sch-edit-shifts input{width:100%;font:inherit;font-size:10px;font-weight:600;text-align:center;
    background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:6px 1px;color:var(--ink);min-width:0;}
  .sch-edit-shifts input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-tint);}
  .sch-edit-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:4px 10px 0;}
  .sch-edit-hdr span{text-align:center;font-size:9px;font-weight:700;color:var(--ink-3);text-transform:uppercase;}

  .scan-overlay{position:fixed;inset:0;z-index:80;background:rgba(8,18,12,.96);display:none;flex-direction:column;
    overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .scan-overlay.open{display:flex;}
  .scan-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;flex:none;}
  .scan-bar .t{color:#eef4f0;font-size:16px;font-weight:700;}
  .scan-bar button{appearance:none;border:none;background:rgba(255,255,255,.13);color:#fff;
    font:inherit;font-size:13px;font-weight:600;padding:8px 14px;border-radius:9px;cursor:pointer;}
  .scan-bar button:active{background:rgba(255,255,255,.26);}
  .scan-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:16px;}
  .scan-step{color:var(--ink-2);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .scan-step .num{width:24px;height:24px;border-radius:50%;background:var(--brand);color:#fff;font-size:11px;
    font-weight:700;display:grid;place-items:center;flex:none;}
  .scan-preview{width:100%;max-height:240px;object-fit:contain;border-radius:var(--r);border:1px solid var(--line);background:var(--surface-3);}
  .scan-progress{background:var(--surface);border-radius:8px;overflow:hidden;height:5px;position:relative;}
  .scan-progress-bar{height:100%;background:var(--brand);border-radius:8px;transition:width .3s ease;width:0%;}
  .scan-progress-bar.indet{width:40%;position:absolute;left:0;top:0;
    background:linear-gradient(90deg,transparent,var(--brand) 35%,var(--brand) 65%,transparent);
    animation:scanSlide 1.4s ease-in-out infinite;}
  @keyframes scanSlide{0%{left:-40%;}100%{left:100%;}}
  .scan-frame{position:relative;border-radius:var(--r);overflow:hidden;}
  .scan-frame .scan-preview{display:block;margin:0 auto;}
  .scan-frame .scan-beam{position:absolute;left:0;right:0;top:0;height:2px;pointer-events:none;

const STENCIL_EDITS_KEY="pdp_stencil_edits_v1";
function loadCustomStencil(){ try{ return JSON.parse(localStorage.getItem(STENCIL_CUSTOM_KEY))||[]; }catch(e){ return []; } }
function saveCustomStencil(arr){ try{ localStorage.setItem(STENCIL_CUSTOM_KEY,JSON.stringify(arr)); }catch(e){} }
function loadStencilEdits(){ try{ return JSON.parse(localStorage.getItem(STENCIL_EDITS_KEY))||{}; }catch(e){ return {}; } }
function saveStencilEdits(obj){ try{ localStorage.setItem(STENCIL_EDITS_KEY,JSON.stringify(obj)); }catch(e){} }

let stencilCustom=loadCustomStencil();
let stencilEdits=loadStencilEdits();

function buildStencil(){
  let arr=[];
  try{ arr=JSON.parse(document.getElementById("stencil-data").textContent); }catch(e){ arr=[]; }
  /* Apply edits to embedded items */
  arr.forEach((it,i)=>{
    it.id="s"+i;
    if(stencilEdits[it.c]){
      const e=stencilEdits[it.c];
      if(e.d) it.d=e.d;
      if(e.p) it.p=e.p;
      if(e.u) it.u=e.u;
    }
    it._d=(it.d||"").toLowerCase();
  });
  /* Append custom items */
  stencilCustom.forEach((it,i)=>{
    it.id="cx"+i; it._d=(it.d||"").toLowerCase(); it._custom=true;
    arr.push(it);
  });
  return arr;
}

function escJsStr(s){ return String(s).replace(/\\/g,"\\\\").replace(/"/g,'\\"'); }
function plist(products){
  return "P([" + (products||[]).map(function(p){ return '"'+escJsStr(p.name)+'"'; }).join(",") + "])";
}
function generateSeedCode(){
  var lines=[];
  lines.push("function seed(){");
  lines.push("  return { version:1, sections:[");
  state.sections.forEach(function(sec,si){
    var comma = si<state.sections.length-1 ? "," : "";
    if(isGrouped(sec)){
      lines.push('    { id:uid(), name:"'+escJsStr(sec.name)+'", subsections:[');
      sec.subsections.forEach(function(sub,bi){
        var bcomma = bi<sec.subsections.length-1 ? "," : " ]";
        lines.push('      { id:uid(), name:"'+escJsStr(sub.name)+'", products:'+plist(sub.products)+' }'+bcomma);
      });
      lines.push('     }'+comma);
    } else {
      lines.push('    { id:uid(), name:"'+escJsStr(sec.name)+'", products:'+plist(sec.products)+' }'+comma);
    }
  });
  lines.push("  ], pull:[] };");
  lines.push("}");
  return lines.join("\n");
}

})();

function docPrune(){
  DOC_TYPES.forEach(t=>{
    const days=(DOC_RETAIN_DAYS&&DOC_RETAIN_DAYS[t])||14;
    const cutoff=Date.now()-days*86400000;
    docStore[t]=(docStore[t]||[]).filter(d=>{
      let ts=d.created||0;
      if(d.date){ const dt=Date.parse(d.date+"T00:00:00"); if(!isNaN(dt)) ts=Math.max(ts,dt); }
      return ts>=cutoff;
    });
  });
}

  } else {
    /* migrate from v1 (a plain array of daily-notes docs) */
    try{ const old=JSON.parse(readK("pdp_documents_v1")); if(Array.isArray(old)) docStore.dailynotes=old; }catch(e){}
  }
  DOC_TYPES.forEach(t=>{ if(!Array.isArray(docStore[t])) docStore[t]=[]; });

async function fireNotification(title,body,tag){
  /* Android/iOS PWAs block `new Notification()` in page context — must go
     through the service worker registration. Falls back gracefully. */
  try{
    if(!("Notification" in window)||Notification.permission!=="granted") return false;
    if(navigator.serviceWorker){
      const reg=await navigator.serviceWorker.getRegistration();
      if(reg&&reg.showNotification){
        await reg.showNotification(title,{body,icon:"icon192.png",badge:"icon192.png",tag,vibrate:[200,100,200],renotify:true});
        return true;
      }
    }
    new Notification(title,{body,icon:"icon192.png",tag});
    return true;
  }catch(e){
    try{ new Notification(title,{body}); return true; }catch(e2){ return false; }
  }
}
function scheduleReminderNotifs(){
  Object.values(reminderTimers).forEach(t=>clearTimeout(t));
  reminderTimers={};
  const now=Date.now();
  reminders.forEach(r=>{
    const dt=new Date(r.datetime).getTime();
    const diff=dt-now;
    if(diff>0&&diff<864e5*7){
      reminderTimers[r.id]=setTimeout(async()=>{
        r.fired=true; saveReminders();
        const ok=await fireNotification("PDP Reminder",r.title,"pdp-"+r.id);
        if(!ok) toast("⏰ "+r.title,5000);
      },diff);
    }
  });
}
function catchUpReminders(){
  /* Browsers throttle timers while the app is backgrounded. When we come
     back, fire anything that came due while we were away. */
  const now=Date.now();
  let changed=false;
  reminders.forEach(r=>{
    const dt=new Date(r.datetime).getTime();
    if(dt<=now&&!r.fired&&now-dt<864e5){
      r.fired=true; changed=true;
      fireNotification("PDP Reminder",r.title,"pdp-"+r.id).then(ok=>{ if(!ok) toast("⏰ "+r.title,5000); });
    }
  });
  if(changed) saveReminders();
  scheduleReminderNotifs();
}
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) catchUpReminders(); });
window.addEventListener("focus",catchUpReminders);
function requestNotifPermission(){
  /* Must be called from a user gesture (tap). Returns a promise. */
  return new Promise(resolve=>{
    try{
      if(!("Notification" in window)){ resolve("unsupported"); return; }
      if(Notification.permission==="granted"){ resolve("granted"); return; }
      if(Notification.permission==="denied"){ resolve("denied"); return; }
      Notification.requestPermission().then(p=>resolve(p)).catch(()=>resolve("error"));
    }catch(e){ resolve("error"); }
  });
}

const _sheet={ backdrop:document.getElementById("sheetBackdrop"), box:document.getElementById("sheet"),
  title:document.getElementById("sheetTitle"), msg:document.getElementById("sheetMsg"),
  input:document.getElementById("sheetInput"), ok:document.getElementById("sheetOk"),
  cancel:document.getElementById("sheetCancel"), resolver:null, mode:"confirm" };
function _sheetClose(val){
  _sheet.backdrop.classList.remove("open");
  document.body.style.overflow="";
  const r=_sheet.resolver; _sheet.resolver=null;
  if(_sheet.input) _sheet.input.blur();

function _openSheet(opts){
  return new Promise(resolve=>{
    _sheet.resolver=resolve;
    _sheet.mode=opts.mode;
    _sheet.title.textContent=opts.title||"";
    _sheet.msg.textContent=opts.msg||"";
    _sheet.msg.style.display=opts.msg?"block":"none";
    if(opts.mode==="input"){
      _sheet.box.classList.add("has-input");
      _sheet.input.value=opts.value||"";
      _sheet.input.placeholder=opts.placeholder||"";
      _sheet.ok.textContent=opts.okText||"Save";

    } else {
      _sheet.box.classList.remove("has-input");
      _sheet.ok.textContent=opts.okText||"OK";
      _sheet.ok.className="sheet-btn "+(opts.danger?"danger":"primary");
    }
    _sheet.cancel.textContent=opts.cancelText||"Cancel";
    _sheet.backdrop.classList.add("open");
    document.body.style.overflow="hidden";
    if(opts.mode==="input"){ setTimeout(()=>{ _sheet.input.focus(); _sheet.input.select(); },180); }
  });
}

/* ======= Stencil search ======= */
function reEsc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
function searchStencil(q){
  q=q.trim().toLowerCase(); if(!q) return [];
  const toks=q.split(/\s+/).filter(Boolean);
  const res=[];
  for(const it of STENCIL){
    const d=it._d; let ok=true, score=0;
    for(const t of toks){
      const i=d.indexOf(t);
      const inCode=it.c.indexOf(t)>=0;
      if(i<0 && !inCode){ ok=false; break; }
      if(d.startsWith(t)) score+=4;
      else if(d.indexOf(" "+t)>=0) score+=3;
      else if(i>=0) score+=1;
      if(inCode) score+=2;
    }
    if(ok) res.push([score,d.length,it]);
  }
  res.sort((a,b)=> b[0]-a[0] || a[1]-b[1] || (a[2].d<b[2].d?-1:1));
  return res.map(x=>x[2]);
}
function highlight(desc,q){
  let h=esc(desc);
  q.trim().toLowerCase().split(/\s+/).filter(Boolean).forEach(t=>{
    try{ h=h.replace(new RegExp("("+reEsc(esc(t))+")","ig"),"<mark>$1</mark>"); }catch(e){}
  });
  return h;
}

function wireStencilSuggest(inputId, addFn){
  const inp=document.getElementById(inputId);
  const sg=document.getElementById("sg_"+inputId);
  if(!inp||!sg) return;
  let blurTimer=null;
  const showSg=()=>{
    const q=inp.value.trim();

    const hits=searchStencil(q).slice(0,6);
    if(!hits.length){ sg.classList.remove("open"); sg.innerHTML=""; return; }
    sg.innerHTML=hits.map(it=>{
      const meta=metaStr(it.p,it.u);
      return `<button class="sg-item" data-sgname="${esc(it.d)}">
        <div class="sg-name">${highlight(it.d,q)}</div>
        ${it.c?`<span class="sg-code">#${esc(it.c)}</span>`:""}
        ${meta?`<span class="sg-meta">${esc(meta)}</span>`:""}
      </button>`;
    }).join("");

      b.onclick=()=>{
        inp.value=b.dataset.sgname;

}

function parseShiftStart(s){
  if(!s) return null;
  const m=String(s).trim().match(/^(\d{1,2})(?::(\d{2}))?\s*(A|P)/i);
  if(!m) return null;
  let h=parseInt(m[1]),min=parseInt(m[2]||0);
  const ap=m[3].toUpperCase();
  if(ap==="P"&&h<12) h+=12; if(ap==="A"&&h===12) h=0;
  return h*60+min;
}
function weekForDate(d){
  try{
    for(const w of sched.weeks){
      if(!w.startDate) continue;
      const s=new Date(w.startDate+"T00:00:00");
      const e=new Date(s.getTime()+7*86400000);
      if(d>=s&&d<e) return w;
    }
  }catch(e){}
  return (sched.weeks&&sched.weeks[0])||null;
}
function nextEmployeeIn(){
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  for(let off=0;off<7;off++){
    const d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+off);
    const w=weekForDate(d);
    if(!w||!Array.isArray(w.employees)||!w.employees.length) continue;
    const key=SCH_KEYS[d.getDay()];
    let best=null;
    for(const emp of w.employees){
      const sh=((emp.shifts&&emp.shifts[key])||"").trim();
      const st=parseShiftStart(sh);
      if(st===null) continue;
      if(off===0&&st<=nowMin) continue;
      if(!best||st<best.start) best={start:st,name:emp.name,shift:sh};
    }
    if(best){
      return { name:(best.name||"").split(" ")[0]||best.name,
        time:best.shift.split("-")[0].trim(),
        label:off===0?"":off===1?"Tomorrow":SCH_DAYS[d.getDay()] };
    }
  }
  return null;
}

/* ================= STENCIL ================= */
function renderStencil(){
  const q=stencilState.query;
  let body="";

  /* Add Item form in edit mode */
  if(stencilEdit){
    body+=`<div class="addrow" style="flex-wrap:wrap;gap:6px;">
      <input id="newStCode" placeholder="Item code" style="width:80px;flex:none" autocomplete="off">
      <input id="newStDesc" placeholder="Description" style="flex:1;min-width:120px" autocomplete="off">
      <input id="newStPack" placeholder="Pack" style="width:50px;flex:none" autocomplete="off">
      <select id="newStUnit" style="flex:none;font:inherit;font-size:13px;padding:8px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink)"><option value="ea">ea</option><option value="lb">lb</option></select>
      <button id="addStItem" class="btn" style="flex:none">Add</button>
    </div>`;
  }

  if(q.trim()){
    const hits=searchStencil(q);
    if(!hits.length){
      body+=`<div class="empty"><div class="ei">${I.search}</div>No stencil items match <b>"${esc(q)}"</b>.<br>Try a shorter fragment.</div>`;
    } else {
      const cap=Math.min(hits.length,80);
      body+=`<div class="smeta"><span><b>${hits.length}</b> match${hits.length!==1?"es":""}${hits.length>cap?` · showing ${cap}`:""}</span>${stencilEdit?"":`<span>Tap +/− holes list</span>`}</div>`;
      for(let i=0;i<cap;i++) body+=stencilRow(hits[i],q,true);
    }
  } else {
    const byCat={};
    for(const it of STENCIL){
      const cat=it._custom?"★ Custom Items":catOf(it.d);
      if(!byCat[cat]) byCat[cat]=[];
      byCat[cat].push(it);
    }
    const totalCustom=stencilCustom.length;
    body+=`<div class="smeta"><span><b>${STENCIL.length}</b> items · ${CAT_ORDER.length} categories${totalCustom?` · ${totalCustom} custom`:""}</span>${stencilEdit?"":`<span>Tap +/− holes list</span>`}</div>`;
    /* Show custom items first */
    if(byCat["★ Custom Items"]&&byCat["★ Custom Items"].length){
      body+=`<div class="grp">★ Custom Items<span class="gc tnum">${byCat["★ Custom Items"].length}</span></div>`;
      for(const it of byCat["★ Custom Items"]) body+=stencilRow(it,null,false);
    }
    for(const cat of CAT_ORDER){
      const items=byCat[cat];
      if(!items||!items.length) continue;
      body+=`<div class="grp">${esc(cat)}<span class="gc tnum">${items.length}</span></div>`;
      for(const it of items) body+=stencilRow(it,null,false);
    }
  }

  view.innerHTML=`<div class="search">
      <span class="si">${I.filter}</span>
      <input id="sq" type="search" inputmode="search" autocomplete="off" autocorrect="off" autocapitalize="off"
        placeholder="Filter stencil — name, code, keyword…" value="${esc(q)}">
      <button class="clr${q?" show":""}" id="sclr" aria-label="Clear">${I.x}</button>
    </div>${body}`;

  /* Wire search */
  const inp=document.getElementById("sq"), clr=document.getElementById("sclr");
  if(inp){
    inp.oninput=()=>{ stencilState.query=inp.value; const pos=inp.selectionStart; renderStencil();
      const f=document.getElementById("sq"); if(f){ f.focus(); try{f.setSelectionRange(pos,pos);}catch(e){} } };
    if(stencilState.query) { inp.focus(); try{inp.setSelectionRange(stencilState.query.length,stencilState.query.length);}catch(e){} }
  }
  if(clr) clr.onclick=()=>{ stencilState.query=""; renderStencil(); const f=document.getElementById("sq"); if(f) f.focus(); };

  /* Wire PLU toggle (non-edit mode) */
  if(!stencilEdit){
    view.querySelectorAll("[data-plu]").forEach(b=>b.onclick=()=>{
      const it=STENCIL.find(x=>x.id===b.dataset.plu); if(!it) return;
      togglePLU(it);
      const sc=window.scrollY; renderStencil(); window.scrollTo(0,sc);
    });
  }

  /* Wire edit mode controls */
  if(stencilEdit){
    /* Add item */
    const addBtn=document.getElementById("addStItem");
    if(addBtn) addBtn.onclick=()=>{
      const c=(document.getElementById("newStCode").value||"").trim();
      const d=(document.getElementById("newStDesc").value||"").trim();
      const p=(document.getElementById("newStPack").value||"").trim();
      const u=document.getElementById("newStUnit").value||"ea";
      if(!d){ alert("Description is required."); return; }
      stencilCustom.push({c:c||("C"+Date.now()),d,p:p||"1",u});
      saveCustomStencil(stencilCustom); refreshStencil(); toast("Item added"); renderStencil();
    };
    /* Edit item */
    view.querySelectorAll("[data-stedit]").forEach(b=>b.onclick=()=>{
      const id=b.dataset.stedit;
      const it=STENCIL.find(x=>x.id===id); if(!it) return;
      const nd=prompt("Description:",it.d); if(nd===null) return;
      const np=prompt("Pack size:",it.p); if(np===null) return;
      const nu=prompt("Unit (ea/lb):",it.u); if(nu===null) return;
      if(it._custom){
        const ci=stencilCustom.findIndex(x=>"cx"+stencilCustom.indexOf(x)===id||x.c===it.c);
        if(ci>=0){ if(nd) stencilCustom[ci].d=nd; if(np) stencilCustom[ci].p=np; if(nu) stencilCustom[ci].u=nu; saveCustomStencil(stencilCustom); }
      } else {
        stencilEdits[it.c]={d:nd||it.d, p:np||it.p, u:nu||it.u};
        saveStencilEdits(stencilEdits);
      }
      refreshStencil(); const sc=window.scrollY; renderStencil(); window.scrollTo(0,sc);
    });
    /* Delete custom item */
    view.querySelectorAll("[data-stdel]").forEach(b=>b.onclick=()=>{
      const code=b.dataset.stdel;
      if(!confirm("Delete this custom item?")) return;
      stencilCustom=stencilCustom.filter(x=>x.c!==code);
      saveCustomStencil(stencilCustom); refreshStencil(); renderStencil();
    });
  }
}

function stencilRow(it,q,useHighlight){
  const on=isOnPLU(it.c); const meta=metaStr(it.p,it.u);
  const nameHtml=useHighlight&&q?highlight(it.d,q):esc(it.d);
  if(stencilEdit){
    return `<div class="sr" style="cursor:default;display:flex;align-items:center;gap:8px;">
      <div class="bd" style="flex:1"><div class="nm">${nameHtml}${it._custom?'<span style="color:var(--brand);font-size:10px;font-weight:700;margin-left:6px">CUSTOM</span>':""}</div>
        <div class="mt">${it.c?`<span class="code">#${esc(it.c)}</span>`:""}${meta?`<span>${esc(meta)}</span>`:""}</div></div>
      <button class="sch-sm-btn" data-stedit="${it.id}" style="flex:none;padding:6px">${I.pen}</button>
      ${it._custom?`<button class="del" data-stdel="${esc(it.c)}" style="flex:none">${I.x}</button>`:""}
    </div>`;
  }
  return `<button class="sr${on?" on":""}" data-plu="${it.id}">

    <div class="bd"><div class="nm">${nameHtml}</div>
      <div class="mt">${it.c?`<span class="code">#${esc(it.c)}</span>`:""}${meta?`<span>${esc(meta)}</span>`:""}</div></div>
  </button>`;
}

function wireGrouped(sec){
  if(!ll.edit){
    view.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>{ const id=b.dataset.toggle; ll.open[id]=!ll.open[id]; render(); });
    view.querySelectorAll("[data-prod]").forEach(b=>b.onclick=()=>{ toggleProduct(sec.id,b.dataset.psub,b.dataset.prod); render(); });
  } else {
    view.querySelectorAll("[data-rnsub]").forEach(inp=>inp.onchange=()=>{ const s=subById(sec,inp.dataset.rnsub); s.name=inp.value.trim()||s.name; save(); render(); });
    view.querySelectorAll("[data-delsub]").forEach(b=>b.onclick=()=>{ const sub=subById(sec,b.dataset.delsub);
      if(confirm(`Delete "${sub.name}"?`)){ state.pull=state.pull.filter(p=>p.subId!==sub.id); sec.subsections=sec.subsections.filter(x=>x.id!==sub.id); save(); render(); } });
    view.querySelectorAll("[data-delprod]").forEach(b=>b.onclick=()=>{ const sub=subById(sec,b.dataset.psub),pid=b.dataset.delprod; sub.products=sub.products.filter(x=>x.id!==pid); state.pull=state.pull.filter(p=>p.productId!==pid); save(); render(); });

    view.querySelectorAll("[data-gmoveup]").forEach(b=>b.addEventListener("click",function(e){
      e.preventDefault(); const [sid,pid]=b.dataset.gmoveup.split("_"); const sub=subById(sec,sid); if(!sub) return;
      const i=sub.products.findIndex(x=>x.id===pid);
      if(i>0){ [sub.products[i-1],sub.products[i]]=[sub.products[i],sub.products[i-1]]; save(); render(); }
    }));
    view.querySelectorAll("[data-gmovedown]").forEach(b=>b.addEventListener("click",function(e){
      e.preventDefault(); const [sid,pid]=b.dataset.gmovedown.split("_"); const sub=subById(sec,sid); if(!sub) return;
      const i=sub.products.findIndex(x=>x.id===pid);
      if(i<sub.products.length-1){ [sub.products[i],sub.products[i+1]]=[sub.products[i+1],sub.products[i]]; save(); render(); }
    }));
    view.querySelectorAll("[data-addprod]").forEach(b=>{ const run=()=>{ const sub=subById(sec,b.dataset.addprod),inp=document.getElementById("np_"+b.dataset.addprod); const v=inp.value.trim(); if(!v) return; sub.products.push({id:uid(),name:v}); save(); render(); const f=document.getElementById("np_"+b.dataset.addprod); if(f) f.focus(); };

function wireProducts(sec,cont,subId){
  if(ll.edit){
    view.querySelectorAll("[data-delprod]").forEach(b=>b.onclick=()=>{ const pid=b.dataset.delprod; cont.products=cont.products.filter(x=>x.id!==pid); state.pull=state.pull.filter(p=>p.productId!==pid); save(); render(); });
    /* Reorder */
    view.querySelectorAll("[data-moveup]").forEach(b=>b.addEventListener("click",function(e){
      e.preventDefault(); const pid=b.dataset.moveup; const i=cont.products.findIndex(x=>x.id===pid);
      if(i>0){ [cont.products[i-1],cont.products[i]]=[cont.products[i],cont.products[i-1]]; save(); render(); }
    }));
    view.querySelectorAll("[data-movedown]").forEach(b=>b.addEventListener("click",function(e){
      e.preventDefault(); const pid=b.dataset.movedown; const i=cont.products.findIndex(x=>x.id===pid);
      if(i<cont.products.length-1){ [cont.products[i],cont.products[i+1]]=[cont.products[i+1],cont.products[i]]; save(); render(); }
    }));
    /* Add subsection to flat section */
    const addSub=document.getElementById("addSubsec");
    if(addSub) addSub.addEventListener("click",function(e){
      e.preventDefault();
      const name=prompt("Subsection name:");
      if(!name||!name.trim()) return;
      /* Convert flat section to grouped section */
      if(!sec.subsections) sec.subsections=[];
      sec.subsections.push({id:uid(),name:name.trim(),products:[]});
      /* Move existing products into a "General" subsection if there are any */
      if(sec.products&&sec.products.length){
        sec.subsections.unshift({id:uid(),name:"General",products:sec.products});
        sec.products=undefined;
      }
      save(); render();
    });
    const np=document.getElementById("newProd"),ap=document.getElementById("addProd");
    const add=()=>{ const v=np.value.trim(); if(!v) return; cont.products.push({id:uid(),name:v}); save(); render(); const f=document.getElementById("newProd"); if(f) f.focus(); };
    ap.onclick=add; np.onkeydown=e=>{ if(e.key==="Enter") add(); };
    wireStencilSuggest("newProd",add);
  } else view.querySelectorAll("[data-prod]").forEach(b=>b.onclick=()=>{ toggleProduct(sec.id,subId,b.dataset.prod); render(); });
}

function liHTML(it){
  const hasMeta = it.pluCode || it.pack || it.unit;
  const meta = hasMeta ? metaStr(it.pack,it.unit) : "";

function entryText(entry){
  let txt=entry.date+"\n";
  entry.items.forEach(it=>{
    txt+=`  ${it.name}`;
    if(it.code) txt+=` (#${it.code})`;
    if(it.section) txt+=` — ${it.section}`;
    if(it.sub) txt+=` / ${it.sub}`;
    if(it.note) txt+=` [${it.note}]`;
    txt+="\n";
  });
  return txt;
}
async function copyText(txt){
  try{ await navigator.clipboard.writeText(txt); }catch(er){
    const t=document.createElement("textarea"); t.value=txt; document.body.appendChild(t); t.select();
    try{document.execCommand("copy");}catch(_){} t.remove();
  }
}
function wireUnfound(){

function shortName(n){
  /* "Gavin Dutkiewicz" → "Gavin D." */
  const parts=n.trim().split(/\s+/);
  if(parts.length<=1) return n;
  return parts[0]+" "+parts[parts.length-1].charAt(0)+".";
}
function getWeekDates(startStr){
  const d=new Date(startStr+"T12:00:00");
  if(isNaN(d)) return null;
  const day=d.getDay(); d.setDate(d.getDate()-day);
  const dates=[];
  for(let i=0;i<7;i++){ dates.push((d.getMonth()+1)+"/"+d.getDate()); d.setDate(d.getDate()+1); }
  return dates;
}
function shortShift(v){
  /* "7:00A-3:30P" → "7-3:30" for compact display */
  const m=v.match(/(\d{1,2}):(\d{2})([AP])\s*-\s*(\d{1,2}):(\d{2})([AP])/i);
  if(!m) return v;
  let start=m[2]==="00"?m[1]:m[1]+":"+m[2];
  let end=m[5]==="00"?m[4]:m[4]+":"+m[5];
  return start+m[3].toLowerCase()+"-"+end+m[6].toLowerCase();
}
function calcWeekHrs(emp){
  let total=0;
  for(const k of SCH_KEYS){
    const v=(emp.shifts[k]||"").trim().toLowerCase();
    if(!v||v==="off"||v==="req off"||v==="unavail"||v==="unavailable"||v==="request off") continue;
    const m=v.match(/(\d{1,2})(?::(\d{2}))?\s*(a|p)?.*?(\d{1,2})(?::(\d{2}))?\s*(a|p)?/i);
    if(!m) continue;
    let h1=parseInt(m[1]),min1=parseInt(m[2]||0),ap1=(m[3]||"").toLowerCase();
    let h2=parseInt(m[4]),min2=parseInt(m[5]||0),ap2=(m[6]||"").toLowerCase();
    if(ap1==="p"&&h1<12) h1+=12; if(ap1==="a"&&h1===12) h1=0;
    if(ap2==="p"&&h2<12) h2+=12; if(ap2==="a"&&h2===12) h2=0;
    let diff=(h2*60+min2)-(h1*60+min1);
    if(diff<0) diff+=1440;
    /* Subtract meal break */
    const meal=(emp.meals&&emp.meals[k])?parseInt(emp.meals[k])||0:0;
    diff-=meal;
    if(diff>0) total+=diff;
  }
  return total>0?Math.round(total/60*10)/10:0;
}

    view.querySelectorAll("[data-gevdel]").forEach(b=>b.onclick=()=>{
      const [ci,ii]=b.dataset.gevdel.split("_").map(Number);
      const name=g.categories[ci].items[ii];
      g.categories[ci].items.splice(ii,1);
      if(!g.categories[ci].items.length) g.categories.splice(ci,1);
      saveGevLists(); toast("Removed "+name); renderGEV();
    });
    view.querySelectorAll("[data-gevadditem]").forEach(b=>b.onclick=async()=>{
      const ci=parseInt(b.dataset.gevadditem);
      const v=await askInput("New Item",{placeholder:"Item name",okText:"Add"});
      if(v){ g.categories[ci].items.push(v); saveGevLists(); toast("Item added"); const sc=window.scrollY; renderGEV(); window.scrollTo(0,sc); }
    });
    view.querySelectorAll("[data-gevrencat]").forEach(b=>b.onclick=async()=>{
      const ci=parseInt(b.dataset.gevrencat);

      if(v){ g.categories[ci].name=v; saveGevLists(); toast("Category renamed"); const sc=window.scrollY; renderGEV(); window.scrollTo(0,sc); }
    });

/* ---- Calendar / Reminders ---- */
function renderCalendar(){
  const now=new Date();
  const upcoming=reminders.filter(r=>new Date(r.datetime)>=now).sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));
  const past=reminders.filter(r=>new Date(r.datetime)<now).sort((a,b)=>new Date(b.datetime)-new Date(a.datetime));
  const notifStatus="Notification" in window?Notification.permission:"unsupported";

  let html=`<div class="rem-form">
    <label>Reminder title</label>
    <input id="remTitle" placeholder="e.g. Check banana load…">
    <label>Date & time</label>
    <input id="remDatetime" type="datetime-local">
    <button class="btn block" id="remAdd">${I.bell} Set Reminder</button>
  </div>`;

  if(notifStatus==="denied"){
    html+=`<div class="hintline" style="text-align:center;color:var(--danger);margin-bottom:12px;">Notifications are blocked. Go to your browser/phone settings to enable them for this site.</div>`;
  } else if(notifStatus==="default"){
    html+=`<div class="hintline" style="text-align:center;margin-bottom:12px;">Tap "Set Reminder" to enable notifications. You'll be asked to allow them.</div>`;
  } else if(notifStatus==="granted"){
    html+=`<div class="hintline" style="text-align:center;color:var(--brand-ink);margin-bottom:4px;">✓ Notifications enabled</div>
    <div style="text-align:center;margin-bottom:12px;"><button class="sch-sm-btn" id="remTest">Send test notification</button></div>`;
  } else {
    html+=`<div class="hintline" style="text-align:center;margin-bottom:12px;">Notifications may not be supported on this device. Reminders will still be saved.</div>`;
  }

  if(upcoming.length){
    html+=`<div class="lbl" style="margin-top:8px">Upcoming</div>`;
    upcoming.forEach(r=>{
      const d=new Date(r.datetime);
      const ds=d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})+" at "+d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
      html+=`<div class="rem-card"><div class="rem-icon">${I.bell}</div>
        <div class="rem-bd"><div class="rem-title">${esc(r.title)}</div><div class="rem-time">${ds}</div></div>
        <button class="rem-del" data-rid="${r.id}">${I.x}</button></div>`;
    });
  }
  if(past.length){
    html+=`<div class="lbl" style="margin-top:8px">Past</div>`;
    past.slice(0,10).forEach(r=>{
      const d=new Date(r.datetime);
      const ds=d.toLocaleDateString(undefined,{month:"short",day:"numeric"})+" at "+d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
      html+=`<div class="rem-card"><div class="rem-icon past">${I.bell}</div>
        <div class="rem-bd"><div class="rem-title" style="color:var(--ink-3)">${esc(r.title)}</div><div class="rem-time">${ds}</div></div>
        <button class="rem-del" data-rid="${r.id}">${I.x}</button></div>`;
    });
  }
  if(!upcoming.length&&!past.length){
    html+=`<div class="empty"><div class="ei">${I.bell}</div><b>No reminders</b><br>Set a reminder above to get notified.</div>`;
  }
  if(reminders.length) html+=`<button class="btn-danger" id="remClearPast" style="margin-top:16px">Clear Past Reminders</button>`;

  view.innerHTML=html;

  /* Set default datetime to now + 1 hour */
  const def=new Date(now.getTime()+3600000);
  const pad=n=>(n<10?"0":"")+n;
  document.getElementById("remDatetime").value=
    `${def.getFullYear()}-${pad(def.getMonth()+1)}-${pad(def.getDate())}T${pad(def.getHours())}:${pad(def.getMinutes())}`;

  const addBtn=document.getElementById("remAdd");
  if(addBtn) addBtn.addEventListener("click",async function(e){
    e.preventDefault(); e.stopPropagation();
    const title=document.getElementById("remTitle").value.trim();
    const dt=document.getElementById("remDatetime").value;
    if(!title){ toast("Enter a title"); return; }
    if(!dt){ toast("Pick a date & time"); return; }
    /* Request permission on this tap (user gesture) */
    const perm=await requestNotifPermission();
    reminders.push({id:uid(),title,datetime:dt,created:Date.now()});
    saveReminders();
    scheduleReminderNotifs();
    render();
    if(perm==="granted") toast("Reminder set — notifications on");
    else if(perm==="denied") toast("Reminder saved — enable notifications in settings");
    else if(perm==="unsupported") toast("Reminder saved — notifications not supported here");
    else toast("Reminder set");
  });

  const testBtn=document.getElementById("remTest");
  if(testBtn) testBtn.addEventListener("click",async function(e){
    e.preventDefault(); e.stopPropagation();
    const ok=await fireNotification("PDP Test","Notifications are working! \ud83d\udfe2","pdp-test");
    toast(ok?"Test sent \u2014 check your notification shade":"Couldn't send \u2014 check site notification settings",3200);
  });

  view.querySelectorAll("[data-rid]").forEach(btn=>btn.addEventListener("click",function(e){
    e.preventDefault(); e.stopPropagation();
    reminders=reminders.filter(r=>r.id!==btn.dataset.rid);
    saveReminders();
    scheduleReminderNotifs();
    render(); toast("Reminder removed");
  }));

  const cp=document.getElementById("remClearPast");
  if(cp) cp.addEventListener("click",function(e){
    e.preventDefault(); e.stopPropagation();
    reminders=reminders.filter(r=>new Date(r.datetime)>=now);
    saveReminders();
    render(); toast("Past reminders cleared");
  });
}

/* ---- General Calculator ---- */
function renderCalculator(){
  view.innerHTML=`
    <div class="calc-display" id="calcDisplay">0</div>
    <div class="calc-grid">
      <button class="clear" data-ca="C">C</button>
      <button class="op" data-ca="±">±</button>
      <button class="op" data-ca="%">%</button>
      <button class="op" data-ca="÷">÷</button>
      <button data-ca="7">7</button><button data-ca="8">8</button><button data-ca="9">9</button>
      <button class="op" data-ca="×">×</button>
      <button data-ca="4">4</button><button data-ca="5">5</button><button data-ca="6">6</button>
      <button class="op" data-ca="-">−</button>
      <button data-ca="1">1</button><button data-ca="2">2</button><button data-ca="3">3</button>
      <button class="op" data-ca="+">+</button>
      <button data-ca="0" style="grid-column:span 2">0</button><button data-ca=".">.</button>
      <button class="eq" data-ca="=">=</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn ghost block" id="calcCopy">${I.copy} Copy Result</button>
    </div>`;
  let cur="0",prev=null,op=null,fresh=true;
  const disp=document.getElementById("calcDisplay");
  const update=()=>{ disp.textContent=cur; };
  view.querySelectorAll("[data-ca]").forEach(b=>b.addEventListener("click",function(e){
    e.preventDefault();
    const a=b.dataset.ca;
    if(a>="0"&&a<="9"){
      if(fresh){ cur=a; fresh=false; } else cur+=a;
      if(cur.length>1&&cur[0]==="0"&&cur[1]!==".") cur=cur.substring(1);
    } else if(a==="."){
      if(fresh){ cur="0."; fresh=false; } else if(!cur.includes(".")) cur+=".";
    } else if(a==="C"){ cur="0"; prev=null; op=null; fresh=true; }
    else if(a==="±"){ cur=String(-parseFloat(cur)||0); }
    else if(a==="%"){ cur=String(parseFloat(cur)/100); }
    else if(a==="+"||a==="-"||a==="×"||a==="÷"){
      if(prev!==null&&!fresh) cur=String(doCalc(parseFloat(prev),parseFloat(cur),op));
      prev=cur; op=a; fresh=true;
    } else if(a==="="){
      if(prev!==null){ cur=String(doCalc(parseFloat(prev),parseFloat(cur),op)); prev=null; op=null; fresh=true; }
    }
    update();
  }));
  document.getElementById("calcCopy").addEventListener("click",async function(e){
    e.preventDefault();
    const txt=cur;
    try{ await navigator.clipboard.writeText(txt); }catch(er){ const t=document.createElement("textarea"); t.value=txt; document.body.appendChild(t); t.select(); try{document.execCommand("copy");}catch(_){} t.remove(); }
    toast("Copied "+txt);
  });
}
function doCalc(a,b,op){
  if(op==="+") return Math.round((a+b)*1e10)/1e10;
  if(op==="-") return Math.round((a-b)*1e10)/1e10;
  if(op==="×") return Math.round((a*b)*1e10)/1e10;
  if(op==="÷") return b!==0?Math.round((a/b)*1e10)/1e10:0;
  return b;
}

    checklist.items.forEach(item=>{
      if(checklist.checked[item]) return;
      html+=`<div class="gev-item" data-clcheck="${esc(item)}">
        <div class="gev-tick">${I.check}</div>
        <div class="gev-name">${esc(item)}</div></div>`;
    });
    /* Checked items drop to the bottom */
    const doneItems=checklist.items.filter(item=>checklist.checked[item]);
    if(doneItems.length){
      html+=`<div class="gev-cat">Done${done===total?" \u2713":""}<span class="gc tnum">${doneItems.length}</span></div>`;
      doneItems.forEach(item=>{
        html+=`<div class="gev-item crossed" data-clcheck="${esc(item)}">
          <div class="gev-tick">${I.check}</div>
          <div class="gev-name">${esc(item)}</div></div>`;
      });
    }
  }
  view.innerHTML=html;

  /* Uncheck all */
  const rs=document.getElementById("clReset");
  if(rs) rs.onclick=async()=>{ if(await askConfirm("Uncheck all tasks?",{okText:"Uncheck"})){ checklist.checked={}; saveChecklist(); renderChecklist(); toast("Checklist reset"); } };

  /* View mode: tap to check off */
  if(!clEdit){
    view.querySelectorAll("[data-clcheck]").forEach(el=>el.onclick=()=>{
      const item=el.dataset.clcheck;
      checklist.checked[item]=!checklist.checked[item];
      saveChecklist();
      const sc=window.scrollY; renderChecklist(); window.scrollTo(0,sc);
    });
  }

  /* Edit mode */
  if(clEdit){
    view.querySelectorAll("[data-clup]").forEach(b=>b.onclick=()=>{
      const i=+b.dataset.clup; if(i<=0) return;
      [checklist.items[i-1],checklist.items[i]]=[checklist.items[i],checklist.items[i-1]];
      saveChecklist(); const sc=window.scrollY; renderChecklist(); window.scrollTo(0,sc);
    });
    view.querySelectorAll("[data-cldown]").forEach(b=>b.onclick=()=>{
      const i=+b.dataset.cldown; if(i>=checklist.items.length-1) return;
      [checklist.items[i],checklist.items[i+1]]=[checklist.items[i+1],checklist.items[i]];
      saveChecklist(); const sc=window.scrollY; renderChecklist(); window.scrollTo(0,sc);
    });
    view.querySelectorAll("[data-cledit]").forEach(b=>b.onclick=async()=>{
      const i=+b.dataset.cledit;
      const old=checklist.items[i];
      const v=await askInput("Edit Task",{value:old});
      if(v&&v!==old){
        if(checklist.checked[old]){ delete checklist.checked[old]; checklist.checked[v]=true; }
        checklist.items[i]=v; saveChecklist();
        const sc=window.scrollY; renderChecklist(); window.scrollTo(0,sc);
      }
    });
    view.querySelectorAll("[data-cldel]").forEach(b=>b.onclick=()=>{
      const i=+b.dataset.cldel;
      const nm=checklist.items[i];
      delete checklist.checked[nm];
      checklist.items.splice(i,1);
      saveChecklist(); toast("Removed "+nm);
      const sc=window.scrollY; renderChecklist(); window.scrollTo(0,sc);
    });
    const addItem=document.getElementById("clAddItem");
    if(addItem) addItem.onclick=async()=>{
      const v=await askInput("New Task",{placeholder:"What needs doing?",okText:"Add"});
      if(v){ checklist.items.push(v); saveChecklist(); const sc=window.scrollY; renderChecklist(); window.scrollTo(0,sc); }
    };
  }
}

/* Direct browser → Anthropic. Key in localStorage (pdp_api_key). No server proxy = no timeout. */
function getApiKey(){ try{ return localStorage.getItem("pdp_api_key")||""; }catch(e){ return ""; } }
function setApiKey(k){ try{ localStorage.setItem("pdp_api_key",k); }catch(e){} }
async function anthropicFetch(body){
  const key=getApiKey();
  if(!key) throw Object.assign(new Error("No API key set. Go to Tools → Settings and enter your Anthropic API key."),{status:401});
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify(body)
  });
  if(!resp.ok){
    const err=await resp.json().catch(()=>({}));
    const msg=(err.error&&err.error.message)||"Unknown error";
    const type=(err.error&&err.error.type)||"";
    if(resp.status===401) throw Object.assign(new Error("Invalid API key. Update it in Tools → Settings."),{status:401});
    throw Object.assign(new Error("API "+resp.status+": "+(type?type+" — ":"")+msg),{status:resp.status});
  }
  return resp.json();
}
