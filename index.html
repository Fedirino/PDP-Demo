function handleScanFile(file){
  if(!file) return;

  const reader=new FileReader();
  reader.onload=async()=>{
    const imgSrc=reader.result;

    /* Normalize orientation + compress for API.
       Camera photos carry EXIF rotation that plain canvas drawing ignores,
       which used to send Claude sideways images. createImageBitmap with
       imageOrientation:"from-image" bakes the rotation in. */
    let src=null;
    try{
      if(window.createImageBitmap) src=await createImageBitmap(file,{imageOrientation:"from-image"});
    }catch(e){ src=null; }
    if(!src){
      const img=new Image();
      await new Promise((ok,fail)=>{ img.onload=ok; img.onerror=fail; img.src=imgSrc; });
      src=img;
    }
    const MAX=1600; let w=src.width, h=src.height;
    const scale=Math.min(1, MAX/Math.max(w,h));
    w=Math.round(w*scale); h=Math.round(h*scale);
    const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
    cv.getContext("2d").drawImage(src,0,0,w,h);
    if(src.close) try{ src.close(); }catch(e){}
    const compressed=cv.toDataURL("image/jpeg",0.88);
    const b64=compressed.split(",")[1];

    scanBody.innerHTML=`
      <div class="scan-frame">
        <img src="${imgSrc}" class="scan-preview" alt="Scan photo">
        <div class="scan-beam"></div>
      </div>
      <div class="scan-progress"><div class="scan-progress-bar indet" id="scanBar"></div></div>
      <div class="scan-status" id="scanStatus">Reading the ${scanMode==="gev"?"GEV list":"schedule"}…</div>`;

    const status=document.getElementById("scanStatus");

    try{
      status.textContent=scanMode==="gev"?"Analyzing GEV list…":"Analyzing schedule…";

      const schedulePrompt=`You are reading a grocery store "Wall Schedule" for a produce department. It's a printed grid/table, photographed with a phone.

READ PROCEDURE — follow in order:
1. ORIENT: The photo may be rotated (90/180/270 degrees), tilted, or skewed, and may be dim or low-contrast. Mentally rotate it so the title "Wall Schedule" reads left-to-right at the top, THEN read.
2. Read the day-column headers and their dates (like "Sun 6/14/2026"). Note the Sunday date.
3. Count the employee rows. Then process ONE ROW at a time, left to right, using the printed gridlines to stay inside the correct row — row heights vary.
4. For each day cell read top to bottom: shift time ("7:00A - 3:30P"), role label, sometimes "Meal 30 min"/"Meal 60 min", and a daily-hours number like "8.00".

STRUCTURE:
- Left columns: Employee name (ALL CAPS "LASTNAME, FIRSTNAME M" — sometimes a small employee number appears under the name; ignore it), then Total Hours, Weekly Hours, Sun/Hol Hours.
- There may be TWO Saturday columns — ALWAYS IGNORE THE FIRST/LEFTMOST SATURDAY (usually crosshatched). Only extract: Sun, Mon, Tue, Wed, Thu, Fri, Sat (the rightmost Saturday).

ROLE FILTER — CRITICAL:
- Only these three roles are produce shifts: CLERK, HEADCLERK, MANAGER.
- If the role label is ANYTHING ELSE — e.g. "(GROCERY) CLERK", "(DAIRY) CLERK", "GROCERY CLERK", "DAIRY CLERK", or any other department's role — that employee is loaned out and does NOT count. Treat that cell as EMPTY: output "" for the shift and 0 for the meal that day.
- Never include role text in the output. Shifts are time-only: "7:00A-3:30P".

BLANK/EMPTY CELLS — CRITICAL:
Many cells are blank or show diagonal hatching. These mean the employee does NOT work that day. Use "" (empty string). If a cell has no time written in it, it is EMPTY — never guess or copy from an adjacent cell or row.

SELF-CHECK — the schedule prints the math for you:
- Each worked cell shows a daily-hours number (e.g. "8.00"). Verify: end time minus start time minus meal minutes = that number of hours. If it doesn't match, you misread a digit or the A/P — re-read that cell.
- The Total Hours column equals the sum of that row's daily-hours numbers. Use it to confirm you didn't miss a shift or invent one.

OUTPUT:
First output exactly one short line: the orientation you determined and the Sunday date (e.g. "Upright, week of 6/14/2026"). Then on a new line output ONLY the JSON object — no markdown, no backticks, nothing after it.

{"weekStart":"2026-06-14","employees":[{"name":"Firstname Lastname","shifts":{"sun":"7:00A-3:30P","mon":"","tue":"","wed":"","thu":"","fri":"8:00A-4:30P","sat":""},"meals":{"sun":30,"mon":0,"tue":0,"wed":0,"thu":0,"fri":30,"sat":0}}]}

RULES:
- weekStart: the SUNDAY date from the Sun column header, format "YYYY-MM-DD"
- Convert names: "DUTKIEWICZ, GAVIN S" \u2192 "Gavin Dutkiewicz"
- Shift format: "7:00A-3:30P" (no spaces around dash)
- "" (empty string) for ANY cell that is blank, hatched, or worked in another department (role filter above)
- "REQ OFF" for "Request Off"
- "UNAVAIL" for "UNAVAILABLE"
- meals: integer minutes (30 or 60). Use 0 if no meal, no shift, or the shift was filtered out.
- Read EVERY employee row — do not skip anyone, even rows that are all Request Off`;

      const gevPrompt=`You are reading a grocery store GEV (Guaranteed Everyday Variety) checklist. It lists categories of produce items that must always be stocked.

Extract ALL categories and their items from the image.

Return ONLY a valid JSON object. No markdown, no backticks, no explanation.

{"categories":[{"name":"Category Name","items":["Item 1","Item 2","Item 3"]}]}

RULES:
- Include EVERY category and EVERY item exactly as written
- Preserve the original category names
- List items in the order they appear
- Do not skip any items even if partially visible`;

      const promptText=scanMode==="gev"?gevPrompt:schedulePrompt;

      /* Up to 2 attempts: transient API errors and malformed JSON get one
         automatic retry (with a stricter instruction) before failing. */
      async function scanAttempt(extraInstruction){
        const data=await anthropicFetch({
          model:"claude-sonnet-4-6",
          max_tokens:4096,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
            {type:"text",text:promptText+(extraInstruction||"")}
          ]}]
        });
        let jsonText=data.content.map(b=>b.text||"").join("");
        jsonText=jsonText.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
        /* Salvage JSON embedded in prose */
        if(jsonText&&jsonText[0]!=="{"){
          const i=jsonText.indexOf("{"), j=jsonText.lastIndexOf("}");
          if(i>-1&&j>i) jsonText=jsonText.slice(i,j+1);
        }
        return JSON.parse(jsonText);
      }

      let parsed;
      try{
        parsed=await scanAttempt();
      }catch(e1){
        /* Don't retry auth/key problems */
        if(e1.status===401||e1.status===403) throw e1;
        status.textContent="First pass failed — retrying…";
        await new Promise(r=>setTimeout(r,1200));
        parsed=await scanAttempt("\n\nIMPORTANT: Your previous attempt failed. Look very carefully, correct the image orientation in your head first, and return ONLY the valid JSON object — nothing else.");
      }
      status.textContent="Parsing results…";

      if(scanMode==="gev"){
        /* GEV mode: expect {categories:[...]} */
        if(!parsed.categories||!parsed.categories.length) throw new Error("No GEV categories found.");
        scanParsed=parsed;
        let preview="";
        parsed.categories.forEach(cat=>{
          preview+=`<div class="scan-emp"><div class="scan-emp-name">${esc(cat.name)} (${cat.items.length})</div>
            <div style="font-size:11px;color:var(--ink-2);line-height:1.5">${cat.items.map(it=>esc(it)).join(", ")}</div></div>`;
        });
        const totalItems=parsed.categories.reduce((s,c)=>s+c.items.length,0);
        scanBody.innerHTML=`
          <div class="scan-step"><div class="num">1</div>Photo captured</div>
          <img src="${imgSrc}" class="scan-preview" alt="GEV photo">
          <div class="scan-step"><div class="num">2</div>Done — ${parsed.categories.length} categories, ${totalItems} items</div>
          <div class="scan-result">${preview}</div>
          <div class="scan-step"><div class="num">3</div>Apply — this will replace the current GEV list</div>
          <div style="font-size:11px;color:var(--ink-3);text-align:center;line-height:1.5;padding:0 8px;">⚠️ AI models can make mistakes. Always double-check accuracy — adjust items or retry if needed.</div>
          <div class="scan-actions">
            <button class="btn ghost" id="scanRetry">Retry</button>
            <button class="btn" id="scanApply">${I.check} Apply</button>
          </div>`;
        document.getElementById("scanRetry").onclick=()=>openScanOverlay("gev");
        document.getElementById("scanApply").onclick=applyScanResults;
        return;
      }

      /* Schedule mode */
      let empArr=parsed;
      let weekStart="";
      if(parsed.employees){ empArr=parsed.employees; weekStart=parsed.weekStart||""; }
      if(!Array.isArray(empArr)||!empArr.length){
        throw new Error("No employees found in the response.");
      }

      /* Normalize the parsed data.
         Safety net: even if the AI includes a loaned-out shift (other
         department role like "(Grocery)" or "(Dairy)"), strip it here —
         only CLERK/HEADCLERK/MANAGER produce shifts belong on the board. */
      const OTHER_DEPT=/\(|GROCERY|DAIRY|DELI|MEAT|BAKERY|SEAFOOD|FRONT\s?END|FLORAL|GM\b/i;
      function cleanShift(s){
        s=(s==null?"":String(s)).trim();
        if(!s) return "";
        const u=s.toUpperCase();
        if(u==="REQ OFF"||u==="UNAVAIL") return u;
        if(OTHER_DEPT.test(s)) return "";
        return s;
      }
      scanParsed=empArr.map(emp=>{
        const sh={},ml={};
        SCH_KEYS.forEach(k=>{
          sh[k]=cleanShift(emp.shifts?.[k]);
          ml[k]=sh[k]?(parseInt(emp.meals?.[k])||0):0;
        });
        return { name:emp.name||"Unknown", shifts:sh, meals:ml };
      });
      scanWeekStart=weekStart;

      /* Show results */
      let preview="";
      scanParsed.forEach(emp=>{
        preview+=`<div class="scan-emp"><div class="scan-emp-name">${esc(emp.name)}</div>
          <div class="scan-emp-shifts">
            ${SCH_DAYS.map(d=>`<div class="scan-day-hd">${d.substring(0,2)}</div>`).join("")}
            ${SCH_KEYS.map(k=>`<div class="scan-shift">${esc(emp.shifts[k]||"—")}</div>`).join("")}
          </div></div>`;
      });

      scanBody.innerHTML=`
        <div class="scan-step"><div class="num">1</div>Photo captured</div>
        <img src="${imgSrc}" class="scan-preview" alt="Schedule photo">
        <div class="scan-step"><div class="num">2</div>Done — ${scanParsed.length} employee${scanParsed.length!==1?"s":""} found</div>
        <div class="scan-result">${preview}</div>
        <div class="scan-step"><div class="num">3</div>Apply to ${sched.weeks[schWeek].label}</div>
        <div style="font-size:11px;color:var(--ink-3);text-align:center;line-height:1.5;padding:0 8px;">⚠️ AI models can make mistakes. Always double-check accuracy — adjust shifts or retry if needed.</div>
        <div class="scan-actions">
          <button class="btn ghost" id="scanRetry">Retry</button>
          <button class="btn" id="scanApply">${I.check} Apply</button>
        </div>`;
      document.getElementById("scanRetry").onclick=openScanOverlay;
      document.getElementById("scanApply").onclick=applyScanResults;

    }catch(err){
      scanBody.innerHTML=`
        <div class="scan-frame"><img src="${imgSrc}" class="scan-preview" alt="Scan photo"></div>
        <div class="scan-fail">
          <div class="fi">${I.x}</div>
          <div class="ft">Scan failed</div>
          <div class="fm">${esc(err.message)}</div>
        </div>
        <div class="scan-actions">
          <button class="btn" id="scanRetryBtn">${I.scan} Try Again</button>
          <button class="btn ghost" id="scanCancelBtn">Cancel</button>
        </div>`;
      document.getElementById("scanRetryBtn").addEventListener("click",function(e){ e.preventDefault(); openScanOverlay(scanMode); });
      document.getElementById("scanCancelBtn").addEventListener("click",function(e){ e.preventDefault(); closeScanOverlay(); });
    }
  };
  reader.readAsDataURL(file);
}

/* ---- Display Plan week = upcoming Friday → next Thursday ---- */
function pad2(n){ return String(n).padStart(2,"0"); }
function isoDate(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function mdLabel(d){ return (d.getMonth()+1)+"/"+d.getDate(); }
function upcomingFriday(from){
  const d=from?new Date(from):new Date(); d.setHours(0,0,0,0);
  const add=(5-d.getDay()+7)%7; /* days until Friday; 0 if today is Friday */
  d.setDate(d.getDate()+add);
  return d;
}
function weekRangeLabel(friISO){
  const fri=new Date(friISO+"T00:00:00"); const thu=new Date(fri); thu.setDate(thu.getDate()+6);
  return mdLabel(fri)+"–"+mdLabel(thu);
}


/* Compress a file: a high-quality copy for the API and a smaller copy for storage. */
async function compressImageFile(file){
  const imgSrc=await new Promise((ok,fail)=>{ const r=new FileReader(); r.onload=()=>ok(r.result); r.onerror=fail; r.readAsDataURL(file); });
  let src=null;
  try{ if(window.createImageBitmap) src=await createImageBitmap(file,{imageOrientation:"from-image"}); }catch(e){ src=null; }
  if(!src){ const img=new Image(); await new Promise((ok,fail)=>{ img.onload=ok; img.onerror=fail; img.src=imgSrc; }); src=img; }
  function draw(max,q){
    let w=src.width,h=src.height; const s=Math.min(1,max/Math.max(w,h));
    w=Math.round(w*s); h=Math.round(h*s);
    const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
    cv.getContext("2d").drawImage(src,0,0,w,h);
    return cv.toDataURL("image/jpeg",q);
  }
  const apiURL=draw(2048,0.92);
  const store=draw(900,0.65);
  if(src.close) try{ src.close(); }catch(e){}
  return { imgSrc:store, store, b64:apiURL.split(",")[1] };
}

const dailyNotesPrompt=`You are transcribing a grocery store "Produce Daily Notes" bulletin (Sample Grocery). It was photographed across ONE OR MORE pages, given to you in order. Transcribe EVERYTHING into structured JSON — do not summarize, do not skip anything.

The bulletin has a date near the top, then a series of SECTIONS. Each section is introduced by lines like:
  Category: Fruit
  Contact: Steve Santos 617-774-4445
  Subject: Red Grape Scanning Issue
followed by bullet points and/or a table.

Return ONLY valid JSON. No markdown, no backticks, no commentary.

{"date":"2026-06-11","dateLabel":"Thursday, 06.11.26","sections":[
  {"category":"Fruit","contact":"Steve Santos 617-774-4445","subject":"Red Grape Scanning Issue",
   "bullets":["First bullet verbatim.",">> indented sub-bullet verbatim"],
   "tables":[{"title":"Organic Fruit End (Power Side)","headers":["Priority","Item"],"rows":[["Front Wing","Zespri Org Gold & Green Kiwi"],["1","Driscoll Org Strawberries"]]}]}
]}

RULES:
- date: ISO YYYY-MM-DD parsed from the bulletin's date header. dateLabel: the date exactly as printed.
- Capture EVERY section across ALL pages, IN ORDER. Some pages may continue the same bulletin.
- category / contact / subject: copy exactly. If a field is absent, use "".
- bullets: one string per bullet, transcribed VERBATIM. For an indented/nested sub-bullet, prefix the string with ">> " (two angle brackets and a space). If a section has no bullets, use [].
- tables: reproduce EXACTLY as printed — same column headers (left to right) and same rows. Each row is an array of cell strings matching the header order. Use "" for blank cells. Keep all numbers, %, codes, and dates as written. If a section has no table, use [].
- Do NOT invent, reorder, round, or summarize. Transcribe precisely. Accuracy matters more than anything.`;

  const status=document.getElementById("scanStatus");
  try{
    async function attempt(extra){
const salesPlanPrompt=`You are transcribing a Sample Grocery produce "Display Plan" (the weekly merchandising plan), photographed across ONE OR MORE pages/photos given in order. The sheet may be rotated 90°/180° or be a close-up of part of a page — mentally rotate so titles read left-to-right, then read. The plan is made of titled BLOCKS — refrigerated/dry promo tables, hero pods, end caps / islands, value bins, authorized displays, etc. Transcribe EVERY block EXACTLY. Do not summarize, invent, or reorder.

OUTPUT — ONLY valid JSON (no markdown, no backticks, no commentary):
{"sections":[
  {"category":"<block title, verbatim>","subject":"","contact":"","bullets":["<any printed note / LOCATION banner / instruction, one string each>"],
   "tables":[{"title":"","headers":["Position","Item"],"rows":[["<position label>","<item(s) for that position>"]]}]}

GOLDEN RULES

- DESCRIPTIONS / TAGS belong to the cell they are printed in: keep size codes like "11x14" and the promo flags (DEAL LOCK), (SPOT BUY), (TPR) with the item/column where they appear.

HOW TO READ EACH BLOCK TYPE

1) PROMO TABLES and HERO PODS (Refrigerated Promo Table, Refrigerated Veg Promo Table, Dry Promo Table, Refrigerated Hero Pod, etc.) — these are a 2-D GRID:
   - A SHELF (upper deck) sits directly ABOVE a WELL (lower deck). The Shelf and the Well have the SAME number of COLUMNS, and Well column N is directly BELOW Shelf column N — they are vertically aligned. First COUNT the columns, then read column by column, left to right.
   - Output ONE ROW PER COLUMN. Use label exactly "Shelf" for each shelf column (left→right), then label exactly "Well" for each well column (left→right). Output the SAME number of "Shelf" rows as "Well" rows so the columns line up.
   - A single column cell often STACKS several items vertically, plus its size/flag tags underneath. Put everything for that one column into that one row's item string, top to bottom, separated by " / ". Example cell: "Strawberries 11x14 / TPR" or "Family Pack Mixed Berries / Family Pack Cut Watermelon".
   - WINGS ("Power Wing" / "Inside Wing"): one row each, label = the wing name.
   Worked example — a refrigerated promo table whose Shelf has 3 columns and Well has 3 aligned columns:
     ["Power Wing","Lemons"]
     ["Shelf","Blackberries 6oz"]
     ["Shelf","Northwest Cherries"]
     ["Shelf","Northwest Cherries"]
     ["Well","Strawberries 11x14 / TPR"]
     ["Well","Family Pack Mixed Berries / Family Pack Cut Watermelon"]
     ["Well","Pint Blueberries 11x14 / DEAL LOCK"]
     ["Inside Wing","Limes"]

2) END CAPS and ISLANDS (Stone Fruit End, Berry End, Grape End, Back of Berry Island, Potato End, Avocado End, Tomato End, …) — a vertical Priority/Item list:
   Output rows in printed order: "Front Wing" first (if present); then the MAIN positions — either "Left","Center","Right", OR the numbered positions "1","2","3","4"(…) where the top number is the FRONT of the island and the bottom is the BACK; then "Back Wing" last (if present). One position per row; if a position holds two items put both with " / ". The numbered front-to-back order and ESPECIALLY the Back Wing must be exact.

3) 4 BLOCK / VALUE BIN / AUTHORIZED DISPLAYS / ADDITIONAL PROGRAMS / location-option lists:
   Transcribe with the natural labels shown (Top Left/Top Right/Bottom Left/Bottom Right, 1..15, etc.), one item per row, blanks as "".

Set "date":"" and "dateLabel":"" — the app assigns the display week itself; do not guess a date from the sheet (any printed range like "6/12-7/16" is a promo period, not the display week).`;

      const promptText=scanMode==="salesplan"?salesPlanPrompt:dailyNotesPrompt;
      const content=docPages.map(p=>({type:"image",source:{type:"base64",media_type:"image/jpeg",data:p.b64}}));

    }
    let parsed;

    catch(e1){ if(e1.status===401||e1.status===403) throw e1; status.textContent="First pass failed — retrying…"; await new Promise(r=>setTimeout(r,1200)); parsed=await attempt("\n\nIMPORTANT: Your previous attempt failed. Return ONLY the valid JSON object, nothing else."); }
    status.textContent="Building document…";

    const sections=Array.isArray(parsed.sections)?parsed.sections.map(s=>({
      category:s.category||"",contact:s.contact||"",subject:s.subject||"",
      bullets:Array.isArray(s.bullets)?s.bullets.map(b=>String(b)):[],
      tables:Array.isArray(s.tables)?s.tables.filter(t=>t&&(Array.isArray(t.headers)||Array.isArray(t.rows))).map(t=>({
        title:t.title||"",headers:Array.isArray(t.headers)?t.headers.map(h=>String(h)):[],
        rows:Array.isArray(t.rows)?t.rows.map(r=>Array.isArray(r)?r.map(c=>String(c==null?"":c)):[String(r)]):[]

    })):[];
    if(!sections.length) throw new Error("No sections found in the notes.");

    scanParsed={ date:parsed.date||"", dateLabel:parsed.dateLabel||"", sections, images:docPages.map(p=>p.store) };

    if(scanMode==="salesplan"){

      ${weekUI}

      <div style="font-size:11px;color:var(--ink-3);text-align:center;line-height:1.5;padding:0 8px;">${scanMode==="salesplan"?"Saved under this display week. Re-scanning a week you already have lets you add to it or replace it.":"If a document for this date already exists, you can add these sections to it."} ⚠️ Check against the printout — AI can make mistakes.</div>
      <div class="scan-actions">

async function applyDocScan(){
  if(!scanParsed||!scanParsed.sections) return;
  const type=(scanMode==="salesplan")?"salesplan":"dailynotes";
  const today=new Date(), pad=function(n){ return String(n).padStart(2,"0"); };
  const date=scanParsed.date||today.getFullYear()+"-"+pad(today.getMonth()+1)+"-"+pad(today.getDate());
  const dateLabel=scanParsed.dateLabel||today.toLocaleDateString(undefined,{weekday:"long",year:"numeric",month:"2-digit",day:"2-digit"});
  const arr=docStore[type];
  const existing=arr.find(function(d){ return d.date===date; });

  if(existing){
    /* Show sheet: Add (primary) vs Replace (ghost/danger) */
    const result=await new Promise(function(resolve){
      const bd=document.getElementById("sheetBackdrop");
      const sh=document.getElementById("sheet");
      document.getElementById("sheetTitle").textContent="Page already exists for "+date;
      const msg=document.getElementById("sheetMsg");
      msg.textContent="Add these sections to the existing "+DOC_LABEL[type]+", or replace it entirely?";
      msg.style.display="block";
      sh.classList.remove("has-input");
      /* Repurpose OK as "Add" and Cancel as "Replace" */
      const ok=document.getElementById("sheetOk");
      const cancel=document.getElementById("sheetCancel");
      ok.textContent="Add to existing";
      ok.className="sheet-btn primary";
      cancel.textContent="Replace all";
      cancel.className="sheet-btn ghost";
      bd.classList.add("open");
      document.body.style.overflow="hidden";
      function close(val){ bd.classList.remove("open"); document.body.style.overflow=""; ok.onclick=null; cancel.onclick=null; bd.onclick=null; resolve(val); }
      ok.onclick=function(){ close("add"); };
      cancel.onclick=function(){ close("replace"); };
      bd.onclick=function(e){ if(e.target===bd) close("cancel"); };
    });

    if(result==="cancel"){ return; }
    if(result==="add"){
      /* Merge new sections into existing doc */
      existing.sections=existing.sections.concat(scanParsed.sections);
      docActiveId[type]=existing.id;
      sortDocs(type); docPrune();
      var ok1=saveDocs();
      closeScanOverlay();
      tab="docs"; docView=type; docEdit=false; render(); window.scrollTo(0,0);
      toast(ok1?scanParsed.sections.length+" section"+(scanParsed.sections.length>1?"s":"")+" added":"Saved (storage may be full)");
      return;
    }
    /* result === "replace" — remove existing, fall through to create new */
    docStore[type]=arr.filter(function(d){ return d.id!==existing.id; });
  }

  var doc={ id:"doc_"+Date.now(), date:date, dateLabel:dateLabel, created:Date.now(), images:[], sections:scanParsed.sections };
  docStore[type].unshift(doc);
  sortDocs(type);
  docPrune();
  docActiveId[type]=doc.id;
  var ok2=saveDocs();
  closeScanOverlay();
  tab="docs"; docView=type; docEdit=false; render(); window.scrollTo(0,0);
  toast(ok2?DOC_LABEL[type]+" saved":"Saved (storage is full — older items may not persist)");
}

/* ---- Render document sections (shared by preview + tab) ---- */
function docSectionsHTML(doc,type){
  if(type==="salesplan") return spSectionsHTML(doc);
  return (doc.sections||[]).map(s=>{
    const bullets=(s.bullets||[]).filter(b=>String(b).trim()!=="").map(b=>{
      const sub=/^>>\s?/.test(b);
      return `<li class="${sub?"sub":""}">${esc(b.replace(/^>>\s?/,""))}</li>`;
    }).join("");
    const tables=(s.tables||[]).map(t=>{
      const head=(t.headers||[]).length?`<thead><tr>${t.headers.map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead>`:"";
      const body=`<tbody>${(t.rows||[]).map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join("")}</tr>`).join("")}</tbody>`;
      return `${t.title?`<div class="doc-tbl-title">${esc(t.title)}</div>`:""}<div class="doc-tbl-wrap"><table class="doc-tbl">${head}${body}</table></div>`;
    }).join("");
    return `<div class="doc-card">

      ${bullets?`<ul>${bullets}</ul>`:""}
      ${tables}
    </div>`;
  }).join("");
}

/* ---- Display Plan: render blocks like the printed plan ---- */
function spRank(cat){
  const c=(cat||"").toLowerCase();
  if(c.includes("refrigerated veg promo")||c.includes("veg promo")) return 1;
  if(c.includes("refrigerated promo")) return 0;
  if(c.includes("stone fruit")&&c.includes("power")) return 2;
  if(c.includes("berry end")) return 3;
  if(c.includes("grape end")) return 4;
  return 100;
}
function spOrder(sections){
  return (sections||[]).map((s,i)=>({s,i})).sort((a,b)=>{
    const ra=spRank(a.s.category),rb=spRank(b.s.category);
    return ra!==rb?ra-rb:a.i-b.i;
  }).map(x=>x.s);
}
/* Item-description tagging: promo flags (amber) + sign-size codes like 11x14 (grey). Takes RAW text, escapes internally. */
function spTagHTML(raw){
  var t=esc(String(raw==null?"":raw));
  t=t.replace(/\(?\b(DEAL LOCK|SPOT BUY|TPR)\b\)?/g,'<span class="sp-tag">$1</span>');
  t=t.replace(/\b(\d{1,2}\s?[xX]\s?\d{1,2})\b/g,'<span class="sp-desc">$1</span>');
  return t;
}
/* One item string -> array of stacked lines (top-to-bottom within a single cell). */
function spCellLines(item){
  var s=String(item==null?"":item);
  return s.trim()?s.split(/\s\/\s/).map(function(x){return x.trim();}).filter(function(x){return x!=="";}):[];
}
function spLinesHTML(lines){
  if(!lines||!lines.length) return '<span class="cl">\u2014</span>';
  return lines.map(function(x){ return '<span class="cl">'+spTagHTML(x)+'</span>'; }).join("");
}
/* A block is a Shelf/Well grid fixture if it has Shelf or Well rows and isn't an "end". */
function spTableIsFixture(cat,rows){
  if(/\bend\b/i.test(cat||"")) return false;
  return (rows||[]).some(function(r){ return /^(shelf|well)/i.test(String((r&&r[0])||"").trim()); });
}
/* Render a promo/hero fixture as the printed grid: Shelf deck of columns over an aligned Well deck, wings as bands.
   Each row = one column (left to right). Multiple items stacked in a column come in as " / " within that row's item. */
function spFixtureHTML(rows){
  var topWings=[], botWings=[], shelf=[], well=[], extra=[];
  (rows||[]).forEach(function(r){
    var label=String((r&&r[0])||"").trim();
    var lines=spCellLines(r&&r[1]);
    if(/wing/i.test(label)) (/inside|back/i.test(label)?botWings:topWings).push({label:label,lines:lines});
    else if(/^shelf/i.test(label)) shelf.push(lines);
    else if(/^well/i.test(label)) well.push(lines);
    else extra.push({label:label,lines:lines});
  });
  var n=Math.max(shelf.length,well.length,1);
  function wingHTML(w,cls){
    var v=w.lines.length?w.lines.map(function(x){return spTagHTML(x);}).join(", "):"\u2014";
    return '<div class="sp-wing2'+(cls?" "+cls:"")+'"><span class="wl">'+esc(w.label)+'</span><span class="wv">'+v+'</span></div>';
  }
  function deck(label,cells){
    if(!cells.length) return "";
    var tds="";
    for(var c=0;c<n;c++){
      var cell=cells[c];
      tds+=(cell&&cell.length)?'<td class="dc">'+spLinesHTML(cell)+'</td>':'<td class="dc empty">\u2014</td>';
    }
    return '<tr><td class="dh" colspan="'+n+'">'+esc(label)+'</td></tr><tr>'+tds+'</tr>';
  }
  var table='<table class="sp-grid"><tbody>'+deck("Shelf",shelf)+deck("Well",well);
  extra.forEach(function(e){ table+='<tr><td class="dh" colspan="'+n+'">'+esc(e.label||"Deck")+'</td></tr><tr><td class="dc" colspan="'+n+'">'+spLinesHTML(e.lines)+'</td></tr>'; });
  table+='</tbody></table>';
  return '<div class="sp-fix">'+topWings.map(function(w){return wingHTML(w,"");}).join("")+table+botWings.map(function(w){return wingHTML(w,"bot");}).join("")+'</div>';
}
/* Render ends / islands / lists as a clean ordered two-column table. */
function spPlainHTML(rows){
  var groups=[];
  (rows||[]).forEach(function(r){
    var label=String((r&&r[0])||"").trim();
    var lines=spCellLines(r&&r[1]); if(!lines.length) lines=[""];
    var last=groups.length?groups[groups.length-1]:null;
    if(last&&last.label.toLowerCase()===label.toLowerCase()) last.lines=last.lines.concat(lines);
    else groups.push({label:label,lines:lines});
  });
  var body=groups.map(function(g){
    var has=g.lines.some(function(x){return x;});
    var cell=has?g.lines.map(function(x){ return '<span class="ln">'+(x?spTagHTML(x):"\u2014")+'</span>'; }).join(""):'<span class="ln">\u2014</span>';
    return '<tr><td class="lab">'+esc(g.label)+'</td><td class="'+(has?"":"empty")+'">'+cell+'</td></tr>';
  }).join("");
  return '<table class="sp-plain"><tbody>'+body+'</tbody></table>';
}
function spSectionsHTML(doc){
  return spOrder(doc.sections).map(function(s){
    var notes=(s.bullets||[]).filter(function(b){ return String(b).trim()!==""; })
      .map(function(b){ return '<div class="sp-note">'+esc(String(b).replace(/^>>\s?/,""))+'</div>'; }).join("");
    var tbls=(s.tables||[]).map(function(t){
      var rows=t.rows||[];
      var inner=spTableIsFixture(s.category,rows)?spFixtureHTML(rows):spPlainHTML(rows);
      return (t.title?'<div class="sp-tbl-title">'+esc(t.title)+'</div>':'')+inner;
    }).join("");
    return '<div class="sp-block">'+
      '<div class="sp-head">'+esc(s.category||s.subject||"Block")+'</div>'+
      notes+(tbls||'<div class="sp-fix"></div>')+
      '</div>';
  }).join("");
}

function docToText(doc){
  let out=`${doc.dateLabel||doc.date||"Document"}\n`;
  (doc.sections||[]).forEach(s=>{
    out+="\n";
    if(s.category) out+=`Category: ${s.category}\n`;
    if(s.contact) out+=`Contact: ${s.contact}\n`;
    if(s.subject) out+=`Subject: ${s.subject}\n`;
    (s.bullets||[]).forEach(b=>{ const sub=/^>>\s?/.test(b); out+=(sub?"    - ":"  - ")+b.replace(/^>>\s?/,"")+"\n"; });
    (s.tables||[]).forEach(t=>{
      if(t.title) out+=`  [${t.title}]\n`;
      if((t.headers||[]).length) out+="  "+t.headers.join(" | ")+"\n";
      (t.rows||[]).forEach(r=>{ out+="  "+r.join(" | ")+"\n"; });
    });
  });
  return out;
}

async function copyText(txt,okMsg){
  try{ await navigator.clipboard.writeText(txt); toast(okMsg||"Copied"); }
  catch(e){
    try{ const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); toast(okMsg||"Copied"); }
    catch(e2){ toast("Couldn't copy"); }
  }
}

async function copyImageSrc(src){
  try{
    const img=new Image(); await new Promise((ok,fail)=>{ img.onload=ok; img.onerror=fail; img.src=src; });
    const cv=document.createElement("canvas"); cv.width=img.naturalWidth; cv.height=img.naturalHeight;
    cv.getContext("2d").drawImage(img,0,0);
    const blob=await new Promise(r=>cv.toBlob(r,"image/png"));
    if(navigator.clipboard&&window.ClipboardItem){
      await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);
      toast("Photo copied");
    } else throw new Error("no clipboard image");
  }catch(e){
    /* Fallback: open in viewer so the user can long-press to copy/save */
    openImgViewer(src);
    toast("Long-press the image to copy");
  }
}

/* ---- Fullscreen image viewer ---- */
let ivCurrent="";
function openImgViewer(src){ ivCurrent=src; const o=document.getElementById("imgOverlay"); document.getElementById("ivImg").src=src; o.classList.add("open"); document.body.style.overflow="hidden"; }
function closeImgViewer(){ document.getElementById("imgOverlay").classList.remove("open"); document.body.style.overflow=""; }
document.getElementById("ivClose").onclick=closeImgViewer;
document.getElementById("ivCopy").onclick=()=>{ if(ivCurrent) copyImageSrc(ivCurrent); };
document.getElementById("imgOverlay").addEventListener("click",e=>{ if(e.target.id==="imgOverlay") closeImgViewer(); });

/* ================= DOCUMENTS TAB ================= */
function renderDocs(){
  if(docView==="dailynotes"||docView==="salesplan") return renderDocSection(docView);
  return renderDocHub();
}

function renderDocHub(){
  const dn=docStore.dailynotes.length, sp=docStore.salesplan.length;
  const card=(type,ic,sub)=>{
    const n=docStore[type].length;
    return `<button class="tile compact" data-doctype="${type}" style="flex-direction:row;align-items:center;gap:12px;padding:13px 14px">
      <div class="chip violet">${ic}</div>
      <div class="tx"><div class="tt">${DOC_LABEL[type]}</div><div class="sub">${n?n+" saved · "+sub:sub}</div></div>
      <div class="go">${I.chev}</div>
    </button>`;
  };
  view.innerHTML=`
    <div class="lbl" style="margin-top:2px">Sections</div>
    <div class="tiles">
      ${card("dailynotes",I.note,"Scan the daily bulletin")}
      ${card("salesplan",I.clip,"Scan the weekly display plan")}
    </div>
    <div class="lbl">Coming Soon</div>
    <div class="tiles">
      <div class="tile soon">
        <div class="chip mute">${I.pog||I.folder}</div>
        <div class="tx"><div class="tt">Plan-O-Gram</div></div>
        <div class="badge">SOON</div>
      </div>
    </div>
    <div class="hintline" style="text-align:center;margin-top:16px">Daily Notes keep the last two weeks; Display Plan keeps recent weeks. Scanned items are editable and deletable.</div>`;
  view.querySelectorAll("[data-doctype]").forEach(b=>b.onclick=()=>{ docView=b.dataset.doctype; docEdit=false; render(); window.scrollTo(0,0); });
}

function renderDocSection(type){
  const arr=docStore[type], lbl=DOC_LABEL[type];
  if(!arr.length){
    view.innerHTML=`
      <div class="doc-empty">
        <div class="ei">${type==="salesplan"?I.clip:I.note}</div>
        <h3>No ${lbl.toLowerCase()} yet</h3>
        <p>Scan the printed ${lbl.toLowerCase()} and Claude turns it into a clean digital copy — text, exact tables, and the original photo, stored by date.</p>
        <button class="btn" id="docScanEmpty" style="margin:0 auto;min-width:210px">${I.scan} Scan ${lbl}</button>
      </div>`;
    const b=document.getElementById("docScanEmpty"); if(b) b.onclick=()=>openScanOverlay(type);
    return;
  }
  const d=activeDoc(type);
  if(docEdit) return renderDocEdit(type,d);
  const created=d.created?new Date(d.created):null;
  const savedStr=created?created.toLocaleDateString(undefined,{month:"short",day:"numeric"})+" "+created.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}):"";
  view.innerHTML=`
    <div class="lbl" style="margin-top:2px">${lbl}</div>
    <div class="doc-top">
      <select class="doc-sel" id="docSel">
        ${arr.map(x=>`<option value="${x.id}"${x.id===d.id?" selected":""}>${esc(x.dateLabel||x.date)}</option>`).join("")}
      </select>
    </div>
    <div class="doc-actions">
      <button class="btn ghost" id="docCopyTxt">${I.copy} Copy text</button>
      <button class="btn ghost danger-txt" id="docDel">${I.trash} Delete</button>
    </div>
    <div class="doc-meta">Saved ${esc(savedStr)} · ${d.sections.length} section${d.sections.length===1?"":"s"}</div>
    ${docSectionsHTML(d,type)}`;

  const sel=document.getElementById("docSel");
  if(sel) sel.onchange=function(){ docActiveId[type]=this.value; render(); window.scrollTo(0,0); };
  const ct=document.getElementById("docCopyTxt"); if(ct) ct.onclick=()=>copyText(docToText(d),lbl+" copied");
  const dl=document.getElementById("docDel"); if(dl) dl.onclick=()=>{
    if(!confirm(`Delete "${d.dateLabel||d.date}" from ${lbl}?`)) return;
    docStore[type]=arr.filter(x=>x.id!==d.id);
    docActiveId[type]=docStore[type].length?docStore[type][0].id:null;
    saveDocs(); render(); toast("Deleted");
  };
}

/* ---- Edit mode ---- */
function renderDocEdit(type,d){
  const lbl=DOC_LABEL[type];
  const secHTML=(s,si)=>{
    const tbls=(s.tables||[]).map((t,ti)=>{
      const headRow=`<tr>${(t.headers||[]).map((h,hi)=>`<th style="padding:2px"><input class="doc-edit-cell" data-si="${si}" data-ti="${ti}" data-h="${hi}" value="${esc(h)}"></th>`).join("")}<th style="width:30px"></th></tr>`;
      const bodyRows=(t.rows||[]).map((r,ri)=>`<tr>${r.map((c,ci)=>`<td style="padding:2px"><input class="doc-edit-cell" data-si="${si}" data-ti="${ti}" data-r="${ri}" data-c="${ci}" value="${esc(c)}"></td>`).join("")}<td style="padding:2px;text-align:center"><button class="pg-x" style="position:static;background:var(--danger-tint);color:var(--danger)" data-delrow="${si}.${ti}.${ri}">${I.x}</button></td></tr>`).join("");
      return `<div class="doc-tbl-title"><input class="doc-edit-line" data-si="${si}" data-ti="${ti}" data-ttl="1" value="${esc(t.title||"")}" placeholder="Table title (optional)"></div>
        <div class="doc-tbl-wrap"><table class="doc-tbl">${(t.headers||[]).length?`<thead>${headRow}</thead>`:""}<tbody>${bodyRows}</tbody></table></div>
        <button class="btn ghost" style="font-size:11px;padding:6px 10px;margin-top:6px" data-addrow="${si}.${ti}">${I.plus} Add row</button>`;
    }).join("");
    return `<div class="doc-card" style="position:relative">
      <input class="doc-edit-line" style="font-weight:700" data-si="${si}" data-f="category" value="${esc(s.category||"")}" placeholder="Section / block title">
      ${type==="dailynotes"?`<input class="doc-edit-line" data-si="${si}" data-f="subject" value="${esc(s.subject||"")}" placeholder="Subject">
      <input class="doc-edit-line" data-si="${si}" data-f="contact" value="${esc(s.contact||"")}" placeholder="Contact">`:""}
      <textarea class="doc-edit-area" data-si="${si}" data-f="bullets" placeholder="One bullet per line. Start a line with >> for a sub-bullet.">${esc((s.bullets||[]).join("\n"))}</textarea>
      ${tbls}
      <div style="display:flex;gap:7px;margin-top:10px">
        <button class="btn ghost" style="font-size:11px;padding:7px 10px" data-addtbl="${si}">${I.plus} Add table</button>
        <button class="btn ghost danger-txt" style="font-size:11px;padding:7px 10px" data-delsec="${si}">${I.trash} Delete section</button>
      </div>
    </div>`;
  };
  view.innerHTML=`
    <div class="lbl" style="margin-top:2px">Editing · ${lbl}</div>
    <div class="doc-top">
      <input class="doc-sel" id="docEditLabel" value="${esc(d.dateLabel||d.date||"")}" placeholder="Title / date label">
    </div>
    <div class="doc-meta">Tap <b>Done</b> (top right) to save your changes.</div>
    ${(d.sections||[]).map((s,si)=>secHTML(s,si)).join("")}
    <button class="btn ghost block" id="docAddSec" style="margin-top:6px">${I.plus} Add section</button>`;

  /* live-bind text fields to the model */
  const lab=document.getElementById("docEditLabel");
  if(lab) lab.oninput=()=>{ d.dateLabel=lab.value; };
  view.querySelectorAll(".doc-edit-line[data-f]").forEach(inp=>inp.oninput=()=>{ d.sections[+inp.dataset.si][inp.dataset.f]=inp.value; });
  view.querySelectorAll(".doc-edit-area[data-f='bullets']").forEach(ta=>ta.oninput=()=>{ d.sections[+ta.dataset.si].bullets=ta.value.split("\n"); });
  view.querySelectorAll(".doc-edit-line[data-ttl]").forEach(inp=>inp.oninput=()=>{ d.sections[+inp.dataset.si].tables[+inp.dataset.ti].title=inp.value; });
  view.querySelectorAll(".doc-edit-cell").forEach(inp=>inp.oninput=()=>{
    const s=d.sections[+inp.dataset.si], t=s.tables[+inp.dataset.ti];
    if(inp.dataset.h!=null) t.headers[+inp.dataset.h]=inp.value;
    else t.rows[+inp.dataset.r][+inp.dataset.c]=inp.value;
  });
  /* structural buttons (sync handled by oninput already) */
  const addSec=document.getElementById("docAddSec");
  if(addSec) addSec.onclick=()=>{ d.sections.push({category:"",subject:"",contact:"",bullets:[],tables:[]}); render(); };
  view.querySelectorAll("[data-delsec]").forEach(b=>b.onclick=()=>{ if(confirm("Delete this section?")){ d.sections.splice(+b.dataset.delsec,1); render(); } });
  view.querySelectorAll("[data-addtbl]").forEach(b=>b.onclick=()=>{ d.sections[+b.dataset.addtbl].tables.push({title:"",headers:["Position","Item"],rows:[["",""]]}); render(); });
  view.querySelectorAll("[data-addrow]").forEach(b=>b.onclick=()=>{ const[si,ti]=b.dataset.addrow.split(".").map(Number); const t=d.sections[si].tables[ti]; const w=(t.headers||[]).length||(t.rows[0]?t.rows[0].length:2); t.rows.push(Array(w).fill("")); render(); });
  view.querySelectorAll("[data-delrow]").forEach(b=>b.onclick=()=>{ const[si,ti,ri]=b.dataset.delrow.split(".").map(Number); d.sections[si].tables[ti].rows.splice(ri,1); render(); });
}

/* ================= Boot ================= */
render();
scheduleReminderNotifs();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
